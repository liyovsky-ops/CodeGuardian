  ir:
    title:
      en: Incident response checklist
      pl: Lista kontrolna reagowania
    lead:
      en: If you confirm an active LDAP injection breach, work this list top to bottom.
      pl: Po potwierdzeniu aktywnego wycieku LDAP injection przejdź tę listę od góry.
    steps:
      - en: Isolate the affected directory-backed service / LDAP endpoint
        pl: Odizoluj dotkniętą usługę opartą o katalog / endpoint LDAP
      - en: Preserve directory server and application logs (JNDI lookups, filters)
        pl: Zabezpiecz logi serwera katalogowego i aplikacji (lookupy JNDI, filtry)
      - en: Rotate bind credentials, service-account passwords, and session secrets
        pl: Zrotuj poświadczenia bind, hasła kont serwisowych i sekrety sesji
      - en: Assess scope — which DNs / attributes / users were queried or exposed
        pl: Oceń zakres — które DN / atrybuty / konta odpytano lub ujawniono
      - en: "Patch: escape filter metacharacters, switch to parameterized filter API"
        pl: "Załataj: escapuj metaznaki filtra, przejdź na parametryzowane API filtra"
      - en: Disable JNDI lookups / anonymous binds if not strictly required
        pl: Wyłącz lookupy JNDI / anonimowe bindy, jeśli nie są niezbędne
      - en: Notify regulators within 72h (GDPR) and affected users
        pl: Powiadom regulatorów w 72h (GDPR) i dotkniętych użytkowników
      - en: "Post-incident: Semgrep/Burp sweep for sibling LDAP sink endpoints"
        pl: "Po incydencie: przegląd Semgrep/Burp pod kątem bliźniaczych sinków LDAP"
