hero:
  titleMain: "LDAP "
  titleGrad: Injection
  titleTail: ""
  topbar: LDAP Injection
  lead:
    en: LDAP Injection attacks the filter syntax of a directory query rather than a database. User input concatenated into an LDAP search filter lets an attacker inject metacharacters — *, (, ), \\, and NUL — to rewrite the filter logic. A single login that builds (&(uid=USER)(pass=PASS)) by concatenation can be bypassed with a lone * or a tautology like admin)(|(uid=*. In Java, the same trust placed in LDAP URIs powers JNDI abuse (Log4Shell), where a logged ${jndi:ldap://...} string triggers remote class loading and full RCE.
    pl: LDAP Injection atakuje składnię filtra zapytania do katalogu, a nie bazy danych. Wejście użytkownika sklejone z filtrem wyszukiwania LDAP pozwala wstrzyknąć metaznaki — *, (, ), \\ i NUL — by przepisać logikę filtra. Pojedyncze logowanie budujące (&(uid=USER)(pass=PASS)) przez konkatenację można obejść samym * lub tautologią admin)(|(uid=*. W Javie to samo zaufanie do URI LDAP napędza nadużycie JNDI (Log4Shell), gdzie zalogowany ${jndi:ldap://...} wyzwala zdalne ładowanie klas i pełne RCE.
  metrics:
    - k: CWE-90
      v:
        en: Weakness ID
        pl: ID słabości
    - k: "9.8"
      v: CVSS · High
    - k: A03:2021
      v: OWASP Top 10
    - k: "8"
      v:
        en: Attack variants
        pl: Warianty ataku
  sources:
    - label: OWASP A03:2021
      url: https://owasp.org/Top10/A03_2021-Injection/
    - label: CWE-90 (MITRE)
      url: https://cwe.mitre.org/data/definitions/90.html
    - label: PortSwigger Academy
      url: https://portswigger.net/web-security/ldap-injection
    - label: OWASP Cheat Sheet
      url: https://cheatsheetseries.owasp.org/cheatsheets/LDAP_Injection_Prevention_Cheat_Sheet.html
