hero:
  titleMain: SQL
  titleGrad: Injection
  titleTail: ""
  topbar: SQL Injection
  lead:
    en: "SQL Injection lets an attacker alter the structure of a database query by smuggling syntax through unsanitized input — turning a data field into executable SQL. It remains one of the highest-impact web vulnerabilities: a single injectable parameter can expose every record in the database, and in the worst case lead to full remote code execution on the server."
    pl: "SQL Injection pozwala atakującemu zmienić strukturę zapytania do bazy, przemycając składnię przez niesanityzowane wejście — zamieniając pole danych w wykonywalny SQL. To wciąż jedna z najgroźniejszych podatności webowych: pojedynczy podatny parametr może odsłonić każdy rekord w bazie, a w skrajnym przypadku prowadzić do pełnego zdalnego wykonania kodu na serwerze."
  metrics:
    - k: CWE-89
      v:
        en: Weakness ID
        pl: ID słabości
    - k: "9.8"
      v: CVSS · Critical
    - k: A03:2021
      v: OWASP Top 10
    - k: "9"
      v:
        en: Attack variants
        pl: Warianty ataku
  sources:
