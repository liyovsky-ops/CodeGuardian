hero:
  titleMain: Host Header
  titleGrad: Injection
  titleTail: ""
  topbar: Host Header Injection
  lead:
    en: "Host Header Injection occurs when a web application trusts the user-controlled HTTP Host header to generate URLs, route requests, or determine server identity — without validation. An attacker substitutes a malicious domain, hijacking password reset links, poisoning web caches, and in some cases achieving SSRF. The Host header is present in every HTTP request and is fully attacker-controlled."
    pl: "Host Header Injection występuje gdy aplikacja ufa kontrolowanemu przez użytkownika nagłówkowi HTTP Host do generowania URL-i, routingu lub identyfikacji serwera — bez walidacji. Atakujący podstawia złośliwą domenę, przechwytując linki resetowania haseł, zatruwając cache webowy, a w niektórych przypadkach osiągając SSRF. Nagłówek Host jest obecny w każdym żądaniu HTTP i jest w pełni kontrolowany przez atakującego."
