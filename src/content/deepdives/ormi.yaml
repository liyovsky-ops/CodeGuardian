hero:
  titleMain: ORM
  titleGrad: Injection
  titleTail: "& Second-Order SQLi"
  topbar: ORM Injection
  lead:
    en: "ORM Injection occurs when developers bypass an ORM's built-in parameterization by using raw query methods with string concatenation. Second-Order SQL Injection is a two-phase variant: malicious data is stored safely via a parameterized write, then retrieved and concatenated into a new raw query — defeating input validation, WAFs, and DAST scanners entirely."
    pl: "ORM Injection pojawia się gdy deweloperzy omijają wbudowaną parametryzację ORM, używając surowych metod query z konkatenacją stringów. Second-Order SQL Injection to wariant dwufazowy: złośliwe dane są bezpiecznie zapisywane przez sparametryzowany zapis, potem pobierane i sklejane do nowego surowego zapytania — całkowicie omijając walidację wejścia, WAFy i skanery DAST."
  metrics:
    - k: CWE-89
      v:
        en: Weakness ID
        pl: ID słabości
    - k: "8.8"
      v: CVSS · High
    - k: A03:2021
      v: OWASP Top 10
    - k: CVE-2021-35042
      v:
        en: Django order_by() RCE
        pl: Django order_by() RCE
  sources:
