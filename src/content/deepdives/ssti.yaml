meta:
  id: ssti
  threatId: "1.6"
  severity: Critical
  color: "#ef4444"
  colorRgb: 239,68,68
  cwe: CWE-94
  cvss: "10.0"
  standard: OWASP A03:2021
hero:
  titleMain: "Template "
  titleGrad: Injection
  titleTail: " (SSTI)"
  topbar: Server-Side Template Injection
  lead:
    en: Server-Side Template Injection happens when user input is concatenated into a template that the server then evaluates — turning the template engine into a code interpreter for the attacker. A probe like {{7*7}} returning 49 confirms it; from there a Jinja2 MRO chain, a Twig filter callback, or a Freemarker ?new() gadget walks to os / subprocess for remote code execution. Sandboxes are escaped through Flask context objects, blind cases are confirmed by timing and out-of-band callbacks, and the payload often arrives through an email or PDF template. Unauthenticated SSTI rates CVSS 10.0 Critical.
    pl: Server-Side Template Injection występuje, gdy wejście użytkownika jest sklejane z szablonem, który serwer następnie oblicza — zamieniając silnik szablonów w interpreter kodu atakującego. Sonda {{7*7}} zwracająca 49 to potwierdza; stamtąd łańcuch MRO w Jinja2, callback filtra Twig lub gadżet ?new() Freemarker prowadzi do os / subprocess dla zdalnego wykonania kodu. Sandboxy obchodzi się przez obiekty kontekstu Flask, przypadki ślepe potwierdza timing i callbacki out-of-band, a ładunek często przychodzi przez szablon e-mail lub PDF. Nieuwierzytelnione SSTI to CVSS 10.0 Krytyczne.
  metrics:
    - k: CWE-94
      v:
        en: Weakness ID
        pl: ID słabości
    - k: "10.0"
      v: CVSS · Critical
    - k: A03:2021
