  tools:
    title:
      en: Detection tooling
      pl: Narzędzia wykrywania
    lead:
      en: Static analysis flags user input flowing into template compilation; dynamic scanners and out-of-band servers confirm blind exploitability. Use both.
      pl: Analiza statyczna oznacza wejście użytkownika trafiające do kompilacji szablonu; skanery dynamiczne i serwery out-of-band potwierdzają ślepą eksploatowalność. Używaj obu.
    sast:
      - - Semgrep
        - python.flask.security.audit.render-template-string
      - - Bandit
        - B702 — use of mako/template with tainted input
      - - CodeQL
        - java/template-injection dataflow query
      - - Manual
        - grep from_string / render($input) / evaluate(...)
    dast:
      - - tplmap
        - Automated SSTI detection & exploitation
      - - SSTImap
        - Modern tplmap successor, multi-engine
      - - Burp Suite
        - Active Scan + Collaborator for blind OOB
      - - interactsh
        - Out-of-band DNS/HTTP callback server
    note:
      en: <strong>Key signal:</strong> grep for <code>render_template_string(tainted)</code>, <code>Environment().from_string(...)</code>, <code>$twig->render($input)</code>, <code>new Template("", new StringReader(input), ...)</code> and <code>engine.evaluate(..., input)</code> — user input as template source is the root cause.
      pl: <strong>Kluczowy sygnał:</strong> szukaj <code>render_template_string(tainted)</code>, <code>Environment().from_string(...)</code>, <code>$twig->render($input)</code>, <code>new Template("", new StringReader(input), ...)</code> i <code>engine.evaluate(..., input)</code> — wejście użytkownika jako źródło szablonu to przyczyna źródłowa.
  compliance:
    title:
      en: Compliance quick-reference
      pl: Szybka zgodność
    lead:
      en: Where SSTI prevention maps onto the hard compliance gates auditors check — because SSTI-to-RCE is a full system and PII compromise.
      pl: Gdzie zapobieganie SSTI mapuje się na twarde bramki zgodności sprawdzane przez audytorów — bo SSTI-do-RCE to pełna kompromitacja systemu i PII.
    items:
      - std: PCI DSS v4.0
        items:
          - 6.3.2 — inventory & review custom code
          - 6.3.3 — patch known vulnerabilities
          - SSTI→RCE = full CDE compromise, hard QSA gate
      - std: SOC 2
        items:
          - CC6.1 — logical access controls
          - CC7.1 — vulnerability detection
          - Code review + SAST gates for template endpoints
      - std: GDPR / OWASP
        items:
          - Art 32/33 — RCE exposes all PII, 72h breach notice
          - A03:2021 — Injection
          - CWE-94 — Code Injection
    inlineSources:
      - label: PCI DSS v4.0
        url: https://www.pcisecuritystandards.org/document_library/
      - label: SOC 2 (AICPA)
        url: https://www.aicpa.org/resources/article/soc-2-reporting-on-an-examination-of-controls-at-a-service-organization-relevant-to-security
      - label: CWE-94 (MITRE)
        url: https://cwe.mitre.org/data/definitions/94.html
      - label: OWASP A03:2021
        url: https://owasp.org/Top10/A03_2021-Injection/
  ir:
    title:
      en: Incident response checklist
      pl: Lista kontrolna reagowania
    lead:
      en: If you confirm an active SSTI breach, work this list top to bottom.
      pl: Po potwierdzeniu aktywnego wycieku SSTI przejdź tę listę od góry.
    steps:
      - en: Segment the network — isolate the host and block outbound egress immediately
        pl: Segmentuj sieć — natychmiast odizoluj host i zablokuj ruch wychodzący
      - en: Snapshot memory and disk; preserve access logs before they rotate
        pl: Zrób zrzut pamięci i dysku; zabezpiecz logi dostępu zanim się przerotują
      - en: Identify the template engine and the exact endpoint that compiled user input
        pl: Zidentyfikuj silnik szablonów i dokładny endpoint kompilujący wejście użytkownika
      - en: Correlate web access logs with the request carrying the {{ }} / ${ } payload
        pl: Skoreluj logi dostępu WWW z żądaniem niosącym ładunek {{ }} / ${ }
      - en: Rotate every credential the host could reach — IAM roles, API keys, SSH keys
        pl: Zrotuj każde poświadczenie w zasięgu hosta — role IAM, klucze API, klucze SSH
      - en: "Patch: pass input as render context to a fixed template, redeploy with a sandbox"
        pl: "Załataj: przekaż wejście jako kontekst do stałego szablonu, wdróż z sandboxem"
      - en: Hunt for persistence — cron, systemd units, authorized_keys, webshells
        pl: Poluj na persystencję — cron, jednostki systemd, authorized_keys, webshelle
      - en: Notify per PCI DSS / SOC 2 / GDPR obligations and sweep sibling endpoints with Semgrep/tplmap
        pl: Powiadom zgodnie z PCI DSS / SOC 2 / GDPR i przeskanuj bliźniacze endpointy Semgrep/tplmap
