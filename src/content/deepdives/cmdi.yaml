  ir:
    title:
      en: Incident response checklist
      pl: Lista kontrolna reagowania
    lead:
      en: If you confirm an active OS command injection breach, work this list top to bottom.
      pl: Po potwierdzeniu aktywnego wycieku OS command injection przejdź tę listę od góry.
    steps:
      - en: Segment the network — isolate the host and block outbound egress immediately
        pl: Segmentuj sieć — natychmiast odizoluj host i zablokuj ruch wychodzący
      - en: Snapshot memory and disk; preserve access logs before they rotate
        pl: Zrób zrzut pamięci i dysku; zabezpiecz logi dostępu zanim się przerotują
      - en: Inspect /proc/<pid>/cmdline and process tree for the injected command
        pl: Sprawdź /proc/<pid>/cmdline i drzewo procesów pod kątem wstrzykniętego polecenia
      - en: Correlate web access logs with the exact request that carried the payload
        pl: Skoreluj logi dostępu WWW z dokładnym żądaniem niosącym ładunek
      - en: Rotate every credential the host could reach — IAM roles, API keys, SSH keys
        pl: Zrotuj każde poświadczenie w zasięgu hosta — role IAM, klucze API, klucze SSH
      - en: "Patch: switch to argument-list APIs, add allowlist validation, redeploy"
        pl: "Załataj: przejdź na API z listą argumentów, dodaj walidację allowlistą, wdróż ponownie"
      - en: Hunt for persistence — cron, systemd units, authorized_keys, webshells
        pl: Poluj na persystencję — cron, jednostki systemd, authorized_keys, webshelle
      - en: Notify per PCI DSS / SOC 2 obligations and sweep sibling endpoints with Semgrep/commix
        pl: Powiadom zgodnie z PCI DSS / SOC 2 i przeskanuj bliźniacze endpointy Semgrep/commix
