meta:
  id: cmdi
  threatId: "1.3"
  severity: Critical
  color: "#ef4444"
  colorRgb: 239,68,68
  cwe: CWE-78
  cvss: "9.8"
  standard: OWASP A03:2021
hero:
  titleMain: "OS "
  titleGrad: Command
  titleTail: " Injection"
  topbar: OS Command Injection
  lead:
    en: OS Command Injection lets an attacker append their own commands to one your application hands to a system shell. Shell metacharacters — ;, |, &, $(...) and backticks — chain or terminate the intended command, turning a harmless feature like a ping diagnostic into arbitrary remote code execution. When no output is reflected, time-based payloads and out-of-band DNS callbacks confirm execution; from there an attacker pivots to cloud metadata for IAM credentials or escapes a container to the host. Unauthenticated remote instances rate CVSS 9.8 Critical.
    pl: OS Command Injection pozwala atakującemu doklejać własne polecenia do tych, które aplikacja przekazuje powłoce systemowej. Metaznaki — ;, |, &, $(...) i backticki — łączą lub kończą zamierzone polecenie, zmieniając nieszkodliwą funkcję (np. diagnostykę ping) w dowolne zdalne wykonanie kodu. Gdy żaden wynik nie wraca, ładunki czasowe i callbacki out-of-band DNS potwierdzają wykonanie; stamtąd atakujący przeskakuje do metadanych chmury po poświadczenia IAM lub ucieka z kontenera na host. Nieuwierzytelnione zdalne instancje to CVSS 9.8 Krytyczne.
  metrics:
    - k: CWE-78
      v:
        en: Weakness ID
        pl: ID słabości
    - k: "9.8"
      v: CVSS · Critical
    - k: A03:2021
      v: OWASP Top 10
    - k: "8"
      v:
        en: Attack variants
        pl: Warianty ataku
  sources:
