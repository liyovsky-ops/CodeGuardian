hero:
  titleMain: Broken
  titleGrad: Authentication
  titleTail: ""
  topbar: Broken Authentication
  lead:
    en: "Broken Authentication covers every flaw in how an application verifies identity: weak password hashing that lets attackers crack credentials offline in seconds, missing rate-limits that allow unlimited brute-force attempts, session IDs that are never rotated after login enabling fixation attacks, and predictable password-reset tokens that can be guessed. Unlike injection, these flaws are often invisible in code review — they live in what is absent rather than what is present."
    pl: "Broken Authentication obejmuje każdą wadę w sposobie weryfikacji tożsamości: słabe hashowanie haseł pozwalające łamać dane uwierzytelniające offline w sekundy, brak rate-limitingu umożliwiający nieograniczone próby brute-force, tokeny sesji nigdy nie rotowane po logowaniu (session fixation) oraz przewidywalne tokeny resetowania hasła. W odróżnieniu od injection, te błędy są często niewidoczne podczas przeglądu kodu — leżą w tym, czego brakuje, a nie w tym, co jest."
  metrics:
    - k: CWE-287
      v:
        en: Weakness ID
        pl: ID słabości
    - k: "9.8"
      v: CVSS · Critical
    - k: A07:2021
