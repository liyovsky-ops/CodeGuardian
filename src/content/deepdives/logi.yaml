hero:
  titleMain: "Log "
  titleGrad: Injection
  titleTail: ""
  topbar: Log Injection
  lead:
    en: "Log Injection (Log Forging, CWE-117) abuses the fact that user input often reaches log files unescaped. By injecting \\r\\n an attacker fabricates entirely new log entries attributed to arbitrary IPs or users; by injecting HTML or ANSI escapes they poison the viewer the log is read in. The same root cause escalates dramatically with context: a single ${jndi:ldap://...} string turned Log4Shell into a CVSS 10.0 RCE, while bulk synthetic entries quietly dilute SIEM baselines to bury a real attack in the noise."
    pl: "Log Injection (Log Forging, CWE-117) wykorzystuje fakt, że wejście użytkownika często trafia do plików logów bez escapingu. Wstrzykując \\r\\n atakujący fabrykuje całkowicie nowe wpisy przypisane do dowolnych IP lub kont; wstrzykując HTML lub sekwencje ANSI zatruwa podgląd, w którym log jest czytany. Ta sama przyczyna eskaluje dramatycznie w zależności od kontekstu: pojedynczy string ${jndi:ldap://...} zamienił Log4Shell w RCE o CVSS 10.0, a masowe syntetyczne wpisy po cichu rozcieńczają progi SIEM, by zakopać prawdziwy atak w szumie."
  metrics:
