hero:
  titleMain: "No"
  titleGrad: SQL
  titleTail: " Injection"
  topbar: NoSQL Injection
  lead:
    en: NoSQL Injection attacks the JSON structure of a database query rather than its string grammar. There is no quote to escape — the attacker simply injects query operators ($gt, $ne, $regex, $where) as JSON keys, rewriting the filter logic from the inside. A single login endpoint that passes a request body straight into a query can be bypassed entirely, and on self-hosted MongoDB the $where operator can escalate to server-side JavaScript execution.
    pl: NoSQL Injection atakuje strukturę JSON zapytania do bazy, a nie jego gramatykę stringów. Nie ma cudzysłowu do escapowania — atakujący po prostu wstrzykuje operatory ($gt, $ne, $regex, $where) jako klucze JSON, przepisując logikę filtra od środka. Pojedynczy endpoint logowania przekazujący ciało żądania wprost do zapytania można całkowicie obejść, a na self-hosted MongoDB operator $where eskaluje do wykonania JavaScriptu po stronie serwera.
  metrics:
    - k: CWE-943
      v:
        en: Weakness ID
        pl: ID słabości
    - k: "8.8"
      v: CVSS · High
    - k: A03:2021
      v: OWASP Top 10
    - k: "8"
      v:
        en: Attack variants
        pl: Warianty ataku
  sources:
