hero:
  titleMain: CSV / Formula
  titleGrad: Injection
  titleTail: ""
  topbar: CSV / Formula Injection
  lead:
    en: "CSV Injection occurs when user-controlled input containing spreadsheet formula characters (=, +, -, @) is exported to CSV without sanitization. When the victim opens the file in Excel or Google Sheets, the cell content is interpreted and executed as a formula — enabling Remote Code Execution via DDE, silent data exfiltration via IMPORTXML, or phishing via HYPERLINK."
    pl: "CSV Injection występuje gdy dane kontrolowane przez użytkownika zawierające znaki formuł arkuszowych (=, +, -, @) są eksportowane do CSV bez sanityzacji. Gdy ofiara otworzy plik w Excelu lub Google Sheets, zawartość komórki jest interpretowana i wykonywana jako formuła — umożliwiając zdalne wykonanie kodu przez DDE, cichą eksfiltrację danych przez IMPORTXML lub phishing przez HYPERLINK."
