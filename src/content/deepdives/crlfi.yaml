hero:
  titleMain: "CRLF "
  titleGrad: Injection
  titleTail: "/ HTTP Response Splitting"
  topbar: CRLF Injection
  lead:
    en: "CRLF Injection (CWE-113) abuses the fact that the carriage-return + line-feed pair \\r\\n (0x0D 0x0A) is the structural delimiter of the HTTP protocol. When user input reaches a response header unescaped, a single \\r\\n forges new headers (Set-Cookie, Location), and a doubled \\r\\n\\r\\n splits the message into two responses — the attacker now controls the body of the second one. That HTTP Response Splitting primitive escalates fast: a shared proxy caches the forged response and serves stored XSS to every subsequent visitor, while Set-Cookie injection pins a known session ID for fixation. Modern frameworks (Werkzeug 2.1+, Spring 6, Node 14.18+) reject embedded newlines, but raw WSGI writes, sendRedirect, double-encoding (%250d%250a) and h2→HTTP/1.1 downgrade proxies keep the vector alive."
    pl: "CRLF Injection (CWE-113) wykorzystuje fakt, że para powrotu karetki i znaku nowej linii \\r\\n (0x0D 0x0A) jest strukturalnym separatorem protokołu HTTP. Gdy wejście użytkownika trafia do nagłówka odpowiedzi bez escapingu, pojedyncze \\r\\n fałszuje nowe nagłówki (Set-Cookie, Location), a podwojone \\r\\n\\r\\n rozdziela wiadomość na dwie odpowiedzi — atakujący kontroluje wtedy treść tej drugiej. Ten prymityw HTTP Response Splitting szybko eskaluje: współdzielony proxy buforuje sfałszowaną odpowiedź i serwuje stored XSS każdemu kolejnemu użytkownikowi, a wstrzyknięcie Set-Cookie przypina znany identyfikator sesji do fixation. Nowoczesne frameworki (Werkzeug 2.1+, Spring 6, Node 14.18+) odrzucają osadzone nowe linie, ale surowe zapisy WSGI, sendRedirect, podwójne kodowanie (%250d%250a) i proxy degradujące h2→HTTP/1.1 utrzymują wektor przy życiu."
