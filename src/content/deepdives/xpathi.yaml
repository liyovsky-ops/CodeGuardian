      en: Compliance quick-reference
      pl: Szybka zgodność
    lead:
      en: Where XPath injection prevention maps onto the controls auditors check.
      pl: Gdzie zapobieganie XPath injection mapuje się na kontrole sprawdzane przez audytorów.
    items:
      - std: PCI DSS v4.0
        items:
          - Req 6.3.1 — XML config files storing card data
          - protected from XPath injection
          - Req 11.3 — penetration testing
      - std: SOC 2
        items:
          - CC6.1 — logical access controls
          - injection-free XML authentication flows
          - CC7.1 — vulnerability scanning evidence
      - std: GDPR
        items:
          - Art. 32 — appropriate technical measures
          - XML directories with PII → breach reportable
          - if extracted via XPath injection
