hero:
  titleMain: "XPath "
  titleGrad: Injection
  titleTail: ""
  topbar: XPath Injection
  lead:
    en: "XPath Injection attacks the expression syntax of an XML query rather than a database. User input concatenated into an XPath expression lets an attacker inject metacharacters — ', \", [, ], /, *, | — to rewrite the query logic. A login that builds //user[name=INPUT and password=INPUT] by concatenation can be bypassed with ' or '1'='1, an always-true predicate matching every user node. Beyond auth bypass, axes traversal, the | union operator, and the XPath 2.0 doc() function escalate a single injection point into full document extraction and even SSRF."
    pl: "XPath Injection atakuje składnię wyrażenia zapytania XML, a nie bazy danych. Wejście użytkownika sklejone z wyrażeniem XPath pozwala wstrzyknąć metaznaki — ', \", [, ], /, *, | — by przepisać logikę zapytania. Logowanie budujące //user[name=INPUT and password=INPUT] przez konkatenację można obejść przez ' or '1'='1, zawsze prawdziwy predykat pasujący do każdego węzła user. Poza obejściem logowania, osie, operator unii | oraz funkcja doc() z XPath 2.0 eskalują pojedynczy punkt wstrzyknięcia do pełnej ekstrakcji dokumentu, a nawet SSRF."
  metrics:
    - k: CWE-643
      v:
        en: Weakness ID
        pl: ID słabości
    - k: "9.8"
      v: CVSS · High
    - k: A03:2021
