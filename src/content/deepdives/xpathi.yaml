  ir:
    title:
      en: Incident response checklist
      pl: Lista kontrolna reagowania
    lead:
      en: If you confirm an active XPath injection breach, work this list top to bottom.
      pl: Po potwierdzeniu aktywnego wycieku XPath injection przejdź tę listę od góry.
    steps:
      - en: Isolate the affected XML-backed service / XPath endpoint
        pl: Odizoluj dotkniętą usługę opartą o XML / endpoint XPath
      - en: Preserve application and XML parser logs (queries, doc() calls)
        pl: Zabezpiecz logi aplikacji i parsera XML (zapytania, wywołania doc())
      - en: Rotate any credentials stored in queried XML config stores
        pl: Zrotuj poświadczenia przechowywane w odpytywanych magazynach XML
      - en: Assess scope — which nodes / attributes / users were queried or exposed
        pl: Oceń zakres — które węzły / atrybuty / konta odpytano lub ujawniono
      - en: "Patch: bind variables (parameterized XPath), stop concatenation"
        pl: "Załataj: wiąż zmienne (parametryzowany XPath), porzuć konkatenację"
      - en: Disable doc() / collection() and suppress XPath errors to clients
        pl: Wyłącz doc() / collection() i tłum błędy XPath wobec klientów
      - en: Notify regulators within 72h (GDPR) and affected users
        pl: Powiadom regulatorów w 72h (GDPR) i dotkniętych użytkowników
      - en: "Post-incident: SAST/Burp sweep for sibling evaluate/compile sinks"
        pl: "Po incydencie: przegląd SAST/Burp pod kątem bliźniaczych sinków evaluate/compile"
