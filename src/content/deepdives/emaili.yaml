hero:
  titleMain: Email Header
  titleGrad: Injection
  titleTail: ""
  topbar: Email / SMTP Header Injection
  lead:
    en: "Email Header Injection exploits insufficient sanitization of user input in email header fields — an attacker injects CRLF sequences (\\r\\n) to add arbitrary headers like CC, BCC, or even replace the entire email body. The primary goal is to turn a legitimate application into an open spam relay, abusing the server's IP reputation for phishing campaigns."
    pl: "Email Header Injection wykorzystuje brak sanityzacji danych użytkownika w nagłówkach email — atakujący wstrzykuje sekwencje CRLF (\\r\\n) by dodać nagłówki CC, BCC lub podmienić całą treść wiadomości. Głównym celem jest zamiana aplikacji w open relay spamowy, nadużywając reputacji IP serwera do kampanii phishingowych."
