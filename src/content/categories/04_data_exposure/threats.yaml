  - id: "4.18"
    name: "CORS Misconfiguration"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe: []
    desc: |
      CORS Misconfiguration — zagrożenie z kategorii Data Exposure wskazane przez audyt arena. Wymaga walidacji wejścia i kontroli po stronie serwera.
    lang: "python"
    vuln: |
      # PODATNE — CORS Misconfiguration
      # brak walidacji / kontroli (przykład poglądowy)
      result = handle(untrusted_input)
    safe: |
      # BEZPIECZNE — CORS Misconfiguration
      # waliduj wejście, stosuj allowlistę i least privilege
      if not is_valid(untrusted_input):
          raise ValueError('odrzucone')
      result = handle(untrusted_input)
