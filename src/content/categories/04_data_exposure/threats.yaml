threats:
  - id: "4.1"
    name: "Sekrety zahardkodowane w repo"
    severity: "Critical"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-798"
    desc: |
      API keys, tokeny, hasła DB, klucze prywatne w kodzie/configu commitowanym do repo. Najczęstsza przyczyna realnych incydentów.
    lang: "python"
    vuln: |
      # PODATNE
      AWS_SECRET = "AKIA...."; DB_URL = "postgres://user:pass@host/db"
    safe: |
      # BEZPIECZNE — env / secret manager + .gitignore + pre-commit scan
      DB_URL = os.environ["DB_URL"]
  - id: "4.2"
    name: "Dane wrażliwe w logach"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-532"
    desc: |
      Logowanie haseł, tokenów, numerów kart, PII, całych obiektów request/response. Logi wyciekają, są agregowane i mają szeroki dostęp.
    lang: "python"
    vuln: |
      # PODATNE
      logger.info(f"Auth attempt: {request.json}")  # zawiera hasło/token
    safe: |
      # BEZPIECZNE — maskowanie / allowlist pól
      logger.info("Auth attempt", extra={"user": user, "ip": ip})
  - id: "4.3"
    name: "Verbose error messages / stack traces w produkcji"
    severity: "Medium"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-209"
    desc: |
      Ujawnianie stack trace, zapytań SQL, ścieżek, wersji frameworka użytkownikowi — pomaga w rozpoznaniu i ataku.
    lang: "python"
    vuln: |
      # PODATNE
      except Exception as e: return str(e), 500  # leak detali
    safe: |
      # BEZPIECZNE
      except Exception: log.exception("err"); return "Internal error", 500
  - id: "4.4"
    name: "Over-posting / nadmiarowe pola w odpowiedzi API"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-213"
      - "CWE-200"
    desc: |
      Serializacja całego obiektu (np. User) zwraca pola wrażliwe (password_hash, is_admin, internal_notes).
    lang: "python"
    vuln: |
      # PODATNE
      return jsonify(user.__dict__)  # zwraca hash hasła, flagi
    safe: |
      # BEZPIECZNE — jawny schemat odpowiedzi (DTO / serializer z allowlistą)
      return jsonify({"id": user.id, "name": user.name, "email": user.email})
  - id: "4.5"
    name: "PII bez maskowania / nadmiarowa retencja"
    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-359"
    desc: |
      Przechowywanie/wyświetlanie pełnych PII (PESEL, karty, e-mail) bez maskowania, szyfrowania at-rest, lub po terminie retencji.
    lang: "python"
    vuln: |
      # PODATNE — pełny PESEL w odpowiedzi/UI
    safe: |
      # BEZPIECZNE — maskuj: "*******1234", szyfruj at-rest, egzekwuj retencję
  - id: "4.6"
    name: "Cache / autocomplete wrażliwych danych"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-525"
    desc: |
      Wrażliwe odpowiedzi cache'owane (CDN/proxy) lub pola formularzy z autocomplete, brak Cache-Control: no-store.
    lang: "http"
    vuln: |
      # PODATNE — brak nagłówka, wrażliwa odpowiedź trafia do cache
      # (brak) Cache-Control
    safe: |
      # BEZPIECZNE
      Cache-Control: no-store, no-cache, must-revalidate
      # + autocomplete="off" na wrażliwych polach formularza
  - id: "4.7"
    name: "Sekrety w URL / query string / referer"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-598"
    desc: |
      Tokeny/hasła/klucze w query stringu trafiają do logów serwera, historii przeglądarki, nagłówka Referer (wyciek do stron trzecich) i cache proxy.
    lang: "python"
    vuln: |
      # PODATNE — token w URL
      return redirect(f"/dashboard?api_token={token}")
    safe: |
      # BEZPIECZNE — sekrety w nagłówku Authorization lub body POST, nigdy w URL
      resp.headers["Authorization"] = f"Bearer {token}"
  - id: "4.8"
    name: "Source maps / pliki .map / kod źródłowy w produkcji"
    severity: "Medium"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-540"
    desc: |
      Wdrożone source mapy (.js.map) ujawniają oryginalny kod, komentarze, czasem sekrety i wewnętrzne endpointy. Dotyczy też publicznych plików .ts/.scss.
    lang: "text"
    vuln: |
      # PODATNE — app.min.js.map dostępny publicznie
      GET /static/app.min.js.map -> 200 (pełny kod źródłowy)
    safe: |
      # BEZPIECZNE — nie wdrażaj .map do prod (lub chroń auth/wewnętrznie),
      # wyłącz generowanie source maps w buildzie produkcyjnym
  - id: "4.9"
    name: "Backup / pliki tymczasowe / .git / .env wystawione"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-530"
      - "CWE-538"
    desc: |
      Dostępne publicznie: katalog .git/, kopie .bak/.old/~, dump bazy, plik .env, config.php.swp — bezpośredni wyciek kodu i sekretów.
    lang: "text"
    vuln: |
      # PODATNE
      GET /.git/config        GET /.env
      GET /backup.sql         GET /config.php.bak
    safe: |
      # BEZPIECZNE — blokuj ukryte/backup ścieżki na poziomie serwera,
      # trzymaj sekrety poza web root, deploy z czystego artefaktu (bez .git)
  - id: "4.10"
    name: "Metadata / EXIF / ukryte dane w plikach"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-212"
    desc: |
      Uploadowane/udostępniane pliki niosą metadane (geolokalizacja EXIF zdjęć, autor/komentarze w PDF/DOCX, ukryte arkusze, śledzone zmiany).
    lang: "python"
    vuln: |
      # PODATNE — zapis pliku użytkownika bez czyszczenia metadanych
      save(uploaded_image)   # EXIF z GPS pozostaje
    safe: |
      # BEZPIECZNE — strip metadanych przy przetwarzaniu
      from PIL import Image
      img = Image.open(uploaded); img.getexif().clear(); img.save(dest)
  - id: "4.11"
    name: "Brak szyfrowania danych at-rest"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-311"
      - "CWE-312"
    desc: |
      Wrażliwe dane (PII, tokeny, sekrety, kopie zapasowe) przechowywane jako cleartext w bazie/dysku/buckecie. Wyciek bazy = pełny wyciek danych.
    lang: "python"
    vuln: |
      # PODATNE — numer karty/PII w plaintext w DB
      db.save(user_id=u, card_number=card)
    safe: |
      # BEZPIECZNE — szyfrowanie aplikacyjne pól wrażliwych + TDE na storage
      db.save(user_id=u, card_enc=AESGCM(k).encrypt(nonce, card, aad))
