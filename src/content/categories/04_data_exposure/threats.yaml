    desc: |
      Może prowadzić do wycieku danych, ale klasyfikowane jako Business Logic — szczegóły w 8.4.
    lang: "python"
    vuln: |
      # brak przykładu
    safe: |
      # brak przykładu
    ref: "8.4"
  - id: "4.13"
    name: "Directory Listing"
    severity: "Medium"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-548"
    desc: |
      Serwer ujawnia spis plików katalogu — wyciek struktury i wrażliwych plików.
    lang: "yaml"
    vuln: |
      # nginx — listing włączony
      location /files/ {
          autoindex on;
      }
    safe: |
      location /files/ {
          autoindex off;
      }
  - id: "4.14"
    name: "Insecure Direct Object Reference"
    severity: "High"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-639"
    desc: |
      Identyfikator obiektu z requestu używany bez sprawdzenia własności — dostęp do cudzych zasobów.
    lang: "python"
    vuln: |
      @app.route('/invoice/<int:id>')
      def invoice(id):
          return Invoice.get(id).pdf()  # brak sprawdzenia właściciela
    safe: |
      @app.route('/invoice/<int:id>')
      def invoice(id):
          inv = Invoice.get(id)
          if inv.owner_id != current_user.id: abort(403)
          return inv.pdf()
  - id: "4.15"
    name: "Source Code Disclosure"
    severity: "Medium"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-540"
      - "CWE-530"
    desc: |
      Pliki źródłowe/backup/konfiguracji (.git, .env, .bak) dostępne publicznie ujawniają sekrety i logikę.
    lang: "yaml"
    vuln: |
      # brak blokady wrażliwych ścieżek
      location / { try_files $uri =404; }
    safe: |
      location ~ /\.(git|env)|\.(bak|old|sql)$ {
          deny all; return 404;
      }
