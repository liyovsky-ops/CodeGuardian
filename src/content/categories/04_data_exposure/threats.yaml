    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-732"
      - "CWE-311"
    desc: |
      Publiczny bucket / brak szyfrowania połączenia/backupu ujawnia dane.
    lang: "yaml"
    vuln: |
