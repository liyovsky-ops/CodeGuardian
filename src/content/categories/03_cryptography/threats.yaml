threats:
  - id: "3.1"
    name: "Słabe / przestarzałe algorytmy"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-327"
      - "CWE-328"
    desc: |
      MD5/SHA1 do podpisów lub haseł, DES/3DES/RC4 do szyfrowania. Złamane lub trywialne do brute-force.
    desc_en: "Passwords stored as MD5/SHA1/SHA256 hashes without salting — rainbow tables or GPU attacks crack them in minutes."
    lang: "python"
    vuln: |
      # PODATNE
      import hashlib; hashlib.md5(password.encode()).hexdigest()  # hasło
    safe: |
      # BEZPIECZNE — KDF do haseł
      import bcrypt; bcrypt.hashpw(password.encode(), bcrypt.gensalt())
      # lub argon2id / scrypt / PBKDF2 z dużą liczbą iteracji
  - id: "3.2"
    name: "Hasła hashowane szybkim hashem (bez KDF)"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-916"
    desc: |
      Użycie SHA-256 (nawet z solą) do haseł — szybki hash umożliwia masowy brute-force na GPU. Hasła wymagają wolnego KDF.
    desc_en: "Using deprecated/broken cryptographic algorithms: MD5, SHA1, DES, 3DES, RC4, ECB mode — known to be broken against modern attacks."
    lang: "python"
    vuln: |
      # PODATNE — szybki hash, nawet z solą
      hashlib.sha256(salt + password).hexdigest()
    safe: |
      # BEZPIECZNE — argon2id (preferowane) / bcrypt / scrypt
  - id: "3.3"
    name: "Tryb ECB"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-327"
    desc: |
      ECB szyfruje identyczne bloki tak samo — ujawnia wzorce w danych (słynny „pingwin ECB”). Brak semantycznego bezpieczeństwa.
    desc_en: "AES-ECB mode: identical plaintext blocks produce identical ciphertext — reveals data patterns and enables block rearrangement without the key."
    lang: "python"
    vuln: |
      # PODATNE
      Cipher(algorithms.AES(key), modes.ECB())
    safe: |
      # BEZPIECZNE — AEAD z losowym nonce
      AESGCM(key).encrypt(os.urandom(12), data, aad)
  - id: "3.4"
    name: "Statyczny / przewidywalny / reużywany IV/nonce"
    severity: "Critical"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-329"
      - "CWE-330"
    desc: |
      Reużycie nonce w GCM/CTR jest katastrofalne (ujawnia plaintext, łamie autentyczność). Stały IV w CBC = wyciek równości plaintextów.
    desc_en: "Reusing a nonce in stream cipher or AES-CTR/GCM — XOR of two ciphertexts encrypted with the same key+nonce reveals the plaintext."
    lang: "python"
    vuln: |
      # PODATNE — stały nonce
      NONCE = b"000000000000"; AESGCM(key).encrypt(NONCE, data, None)
    safe: |
      # BEZPIECZNE — losowy unikalny nonce per wiadomość
      AESGCM(key).encrypt(os.urandom(12), data, None)
    note: "Critical dla GCM/CTR reuse, High dla CBC."
  - id: "3.5"
    name: "Hardcoded keys / sekrety w kodzie"
    severity: "Critical"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-798"
      - "CWE-321"
    desc: |
      Klucz szyfrujący/HMAC/API zaszyty w źródle lub repo. Dostępny każdemu z dostępem do kodu, niemożliwy do rotacji bez deployu.
    desc_en: "Using random/Math.random (PRNG) instead of os.urandom/secrets (CSPRNG) for tokens, session IDs, or cryptographic keys — output is predictable."
    lang: "python"
    vuln: |
      # PODATNE
      SECRET_KEY = "s3cr3t-prod-key-2026"
    safe: |
      # BEZPIECZNE — z env / secret managera (Vault, KMS, SOPS)
      SECRET_KEY = os.environ["SECRET_KEY"]
  - id: "3.6"
    name: "Słaby RNG do celów bezpieczeństwa"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-338"
      - "CWE-330"
    desc: |
      Użycie random / Math.random() (PRNG, nie kryptograficzny) do tokenów, sesji, resetów haseł — przewidywalne.
    desc_en: "TLS certificate verification disabled (verify=False, InsecureSkipVerify=True) — enables MITM attack: an attacker can intercept and modify encrypted traffic."
    lang: "python"
    vuln: |
      # PODATNE
      import random; token = str(random.randint(0, 10**9))
    safe: |
      # BEZPIECZNE
      import secrets; token = secrets.token_urlsafe(32)
  - id: "3.7"
    name: "Timing attacks (porównania niestałoczasowe)"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-208"
    desc: |
      Porównanie sekretów (token, HMAC, hasło) zwykłym == przerywa się przy pierwszej różnicy — wyciek bajt po bajcie przez pomiar czasu.
    desc_en: "String comparison with `==` for MACs, tokens, or password hashes — vulnerable to timing attacks (different execution time based on match length, enabling secret recovery)."
    lang: "python"
    vuln: |
      # PODATNE
      if user_token == real_token: ...
    safe: |
      # BEZPIECZNE
      import hmac; hmac.compare_digest(user_token, real_token)
    note: "Severity rośnie do High dla zdalnych HMAC w niektórych warunkach."
  - id: "3.8"
    name: "Brak / niewłaściwa weryfikacja certyfikatów TLS"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-295"
    desc: |
      Wyłączona weryfikacja certyfikatu (verify=False) otwiera MITM.
    desc_en: "Cryptographic key or secret hardcoded in source code or config file — rotated by reading the code, not by rotating the key."
    lang: "python"
    vuln: |
      # PODATNE
      requests.get(url, verify=False)
    safe: |
      # BEZPIECZNE — domyślnie verify=True; pinning gdzie potrzeba
      requests.get(url)
  - id: "3.9"
    name: "Padding Oracle / brak AEAD (encrypt bez MAC)"
    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-347"
      - "CWE-696"
    desc: |
      CBC bez uwierzytelnienia + komunikaty/zachowanie różne dla błędnego paddingu → atakujący odszyfrowuje/podrabia. Ogólnie: szyfrowanie bez weryfikacji integralności (encrypt-then-MAC lub AEAD).
    desc_en: "Password-based encryption with a weak KDF (MD5/SHA1 without iterations) instead of bcrypt/Argon2/scrypt — dictionary attacks run at full GPU speed."
    lang: "python"
    vuln: |
      # PODATNE — CBC bez MAC, błąd paddingu rozróżnialny
      pt = unpad(AES_CBC(key, iv).decrypt(ct))  # padding error -> oracle
    safe: |
      # BEZPIECZNE — AEAD (autentyczność wbudowana)
      AESGCM(key).decrypt(nonce, ct, aad)   # InvalidTag = jednolity błąd
  - id: "3.10"
    name: "Słabe parametry KDF / brak soli / brak HKDF"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-916"
      - "CWE-759"
      - "CWE-760"
    desc: |
      PBKDF2 ze zbyt małą liczbą iteracji, brak unikalnej soli (rainbow tables), klucz wyprowadzany z hasła bez KDF, używanie surowego sekretu jako klucza bez HKDF.
    desc_en: "TLS 1.0/1.1 enabled; support for weak cipher suites (RC4, NULL, EXPORT, DES, 3DES, MD5 MACs) — susceptible to BEAST, POODLE, FREAK, DROWN, SLOTH."
    lang: "python"
    vuln: |
      # PODATNE — mało iteracji, stała sól
      PBKDF2(pwd, salt=b"static", iterations=1000)
    safe: |
      # BEZPIECZNE — argon2id / scrypt lub PBKDF2 z dużą liczbą iteracji + losowa sól
      from argon2 import PasswordHasher; PasswordHasher().hash(pwd)
      # do kluczy: HKDF(master, salt=os.urandom(16), info=context)
  - id: "3.11"
    name: "Słabe podpisy / weak RSA padding / krótkie klucze"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-326"
      - "CWE-780"
    desc: |
      RSA < 2048 bitów, RSA z PKCS#1 v1.5 (Bleichenbacher) zamiast OAEP/PSS, klucze symetryczne < 128 bit, krzywe spoza standardu.
    desc_en: "Encryption that is reversible (DES, AES-ECB with key in code) instead of a one-way hash (bcrypt/Argon2) for password storage — key compromise reveals all passwords."
    lang: "python"
    vuln: |
      # PODATNE — RSA 1024 + PKCS#1 v1.5
      key = rsa.generate_private_key(public_exponent=65537, key_size=1024)
      ciphertext = pub.encrypt(data, padding.PKCS1v15())
    safe: |
      # BEZPIECZNE — RSA >=2048/3072 + OAEP do szyfrowania, PSS do podpisu
      key = rsa.generate_private_key(public_exponent=65537, key_size=3072)
      pub.encrypt(data, padding.OAEP(mgf=padding.MGF1(hashes.SHA256()), algorithm=hashes.SHA256(), label=None))
  - id: "3.12"
    name: "Pominięta / błędna weryfikacja podpisu"
    severity: "Critical"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-347"
    desc: |
      Weryfikacja podpisu pominięta, obsługa błędu połykana (verify w try/except bez reakcji), lub porównanie podpisu zwykłym == zamiast verify. Dotyczy webhooków, aktualizacji, tokenów.
    desc_en: "RSA without OAEP padding (raw RSA, PKCS#1 v1.5) — Bleichenbacher/padding oracle attack enables decryption or signature forgery."
    lang: "python"
    vuln: |
      # PODATNE — wynik weryfikacji ignorowany
      try: verify(sig, data, pub)
      except Exception: pass   # i tak przetwarza
    safe: |
      # BEZPIECZNE — błąd weryfikacji = twardy odrzut
      if not verify(sig, data, pub): abort(401)
  - id: "3.13"
