      - "CWE-320"
    desc: |
      Ten sam klucz do szyfrowania i HMAC, jeden klucz dla wszystkich środowisk/tenantów, brak rotacji i wersjonowania kluczy (rotacja niemożliwa bez ponownego szyfrowania).
    desc_en: "Static/deterministic IV in AES-CBC — identical plaintexts produce identical ciphertexts; CBC with known IV enables chosen-plaintext attack."
    lang: "python"
    vuln: |
      # PODATNE — jeden KEY do enc i mac, brak wersji
      mac = hmac.new(KEY, ct).digest(); ct = enc(KEY, pt)
    safe: |
      # BEZPIECZNE — osobne klucze (HKDF z różnym info), key id w danych, rotacja
      k_enc = hkdf(master, info=b"enc"); k_mac = hkdf(master, info=b"mac")
      store({"kid": current_kid, "ct": ct})
  - id: "3.14"
    name: "Cache-Timing Attacks"
    severity: "Medium"
    difficulty: "Hard"
    confidence: "IRON"
    cwe:
      - "CWE-208"
      - "CWE-385"
    desc: |
      Porównania zależne od danych (czas/cache/zużycie energii) wyciekają sekrety bit po bicie.
    desc_en: "GCM tag truncated (e.g., 32 bits instead of 128) — attacker can forge messages with 2^32 attempts instead of 2^128."
    lang: "python"
    vuln: |
      def check(sig, expected):
          return sig == expected  # early-exit, niestałoczasowe
    safe: |
      import hmac
      def check(sig, expected):
          return hmac.compare_digest(sig, expected)  # constant time
