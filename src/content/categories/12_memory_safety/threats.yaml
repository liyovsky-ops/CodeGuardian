  - id: "12.15"
    name: "Memory Corruption"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "IRON"
    cwe:
      - "CWE-120"
      - "CWE-787"
    desc: |
      Kopiowanie inputu bez sprawdzenia długości nadpisuje pamięć poza buforem (RCE/crash).
    desc_en: "Race condition in concurrent memory access (data race): two threads write to the same object without synchronization — undefined behavior, potential corruption."
    lang: "c"
    vuln: |
      char buf[64];
      strcpy(buf, input); // brak kontroli długości
    safe: |
      char buf[64];
      snprintf(buf, sizeof(buf), "%s", input); // ograniczona długość
  - id: "12.16"
    name: "Memory Leak"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "IRON"
    cwe:
      - "CWE-401"
    desc: |
      Brak zwolnienia pamięci stopniowo wyczerpuje zasoby (DoS).
    lang: "c"
    vuln: |
      while (1) { char *b = malloc(1024); process(b); }  // brak free
    safe: |
      while (1) { char *b = malloc(1024); process(b); free(b); }
  - id: "12.17"
