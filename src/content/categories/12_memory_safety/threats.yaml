threats:
  - id: "12.1"
    name: "Stack Buffer Overflow"
    severity: "Critical"
    difficulty: "Medium"
    confidence: "IRON"
    cwe:
      - "CWE-121"
      - "CWE-787"
    desc: |
      Zapis poza koniec bufora na stosie (strcpy/gets/sprintf bez limitu) nadpisuje zapisany adres powrotu / ramki sąsiednie → przejęcie przepływu wykonania, RCE.
    desc_en: "Stack/heap buffer overflow: writing beyond an array boundary overwrites adjacent memory — RCE via return address overwrite or heap metadata corruption."
    lang: "c"
    vuln: |
      // PODATNE — brak kontroli długości
      void greet(const char *name) {
          char buf[32];
          strcpy(buf, name);        // name dłuższe niż 32 -> nadpisuje return address
          printf("Hi %s\n", buf);
      }
    safe: |
      // BEZPIECZNE — ograniczony zapis + terminacja
      void greet(const char *name) {
          char buf[32];
          snprintf(buf, sizeof(buf), "%s", name);   // nigdy nie przekroczy bufora
          printf("Hi %s\n", buf);
      }
  - id: "12.2"
    name: "Heap Buffer Overflow"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "IRON"
    cwe:
      - "CWE-122"
      - "CWE-787"
    desc: |
      Zapis poza obszar alokacji na stercie nadpisuje metadane alokatora lub sąsiednie obiekty (np. wskaźniki funkcji) → korupcja sterty i RCE.
    desc_en: "Use-After-Free: memory is freed but a pointer to it is still used — attacker controls the reallocated memory and achieves RCE or privilege escalation."
    lang: "c"
    vuln: |
      // PODATNE — alokacja bez miejsca na NUL + memcpy bez granicy
      char *p = malloc(len);              // brak +1 na terminator
      memcpy(p, src, len + 1);           // zapis 1 bajt poza blok
    safe: |
      // BEZPIECZNE — alokuj dokładnie, kopiuj tyle ile zaalokowano
      char *p = malloc(len + 1);
      if (!p) return -1;
      memcpy(p, src, len);
      p[len] = '\0';
  - id: "12.3"
    name: "Use-After-Free"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-416"
    desc: |
      Użycie wskaźnika po zwolnieniu pamięci. Atakujący realokuje zwolniony blok kontrolowaną zawartością i przejmuje obiekt (często wskaźnik na funkcję/vtable) → RCE.
    desc_en: "Integer overflow: arithmetic exceeds the type's range — result wraps around, causing under-allocation or boundary check bypass, leading to buffer overflow."
    lang: "c"
    vuln: |
      // PODATNE — dereferencja po free, dangling pointer
      user_t *u = get_user();
      free(u);
      // ... później ...
      printf("%s\n", u->name);          // UAF — blok mógł zostać przejęty
    safe: |
      // BEZPIECZNE — wyzeruj wskaźnik po free, jasna własność
      user_t *u = get_user();
      free(u);
      u = NULL;                          // dereferencja NULL = czysty crash, nie exploit
      if (u) printf("%s\n", u->name);
  - id: "12.4"
    name: "Double Free"
    severity: "High"
    difficulty: "Hard"
    confidence: "IRON"
    cwe:
      - "CWE-415"
    desc: |
      Dwukrotne zwolnienie tego samego bloku psuje struktury wolnych chunków alokatora (free list), umożliwiając write-what-where i RCE.
    desc_en: "Format string: user-controlled `printf(user_input)` — attacker reads/writes arbitrary memory via `%x`, `%n` format specifiers."
    lang: "c"
    vuln: |
      // PODATNE — free na obu ścieżkach
      char *p = malloc(64);
      if (error) { free(p); }            // ścieżka błędu
      process(p);
      free(p);                           // znowu free -> double free
    safe: |
      // BEZPIECZNE — pojedyncza ścieżka zwalniania + wyzerowanie
      char *p = malloc(64);
      if (!p) return -1;
      if (error) goto cleanup;
      process(p);
      cleanup:
          free(p);
          p = NULL;
  - id: "12.5"
    name: "Out-of-Bounds Read"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-125"
    desc: |
      Odczyt poza granicą tablicy/bufora ujawnia sąsiednią pamięć (klucze, wskaźniki — jak Heartbleed) lub powoduje crash. Często przez brak walidacji indeksu/długości z wejścia.
    desc_en: "Double free: `free()` called twice on the same pointer — heap metadata corruption, potential RCE via heap exploitation."
    lang: "c"
    vuln: |
      // PODATNE — długość z atakującego, brak walidacji (à la Heartbleed)
      memcpy(out, buf + offset, attacker_len);   // czyta poza buf -> wyciek pamięci
    safe: |
      // BEZPIECZNE — waliduj offset+len względem rzeczywistego rozmiaru
      if (offset > buf_len || attacker_len > buf_len - offset) return -1;
      memcpy(out, buf + offset, attacker_len);
  - id: "12.6"
    name: "Integer Overflow → Buffer Overflow"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "IRON"
    cwe:
      - "CWE-190"
      - "CWE-680"
    desc: |
      Przepełnienie arytmetyczne przy obliczaniu rozmiaru alokacji daje za mały bufor; następny zapis przepełnia stertę. Klasyczny łańcuch integer overflow → heap overflow.
    desc_en: "Null pointer dereference: accessing memory at address 0 — crash (DoS); on some systems a mapped null page enables local privilege escalation."
    lang: "c"
    vuln: |
      // PODATNE — count*size może się zawinąć
      size_t n = count * size;           // overflow -> mała wartość
      char *buf = malloc(n);
      for (size_t i = 0; i < count; i++) buf[i*size] = ...;   // OOB write
    safe: |
      // BEZPIECZNE — wykrycie overflow przed alokacją (lub calloc)
      if (size != 0 && count > SIZE_MAX / size) return -1;   // overflow check
      char *buf = calloc(count, size);    // calloc sam sprawdza mnożenie
  - id: "12.7"
    name: "Stack Overflow przez niekontrolowaną rekurencję"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-674"
    desc: |
      Rekurencja sterowana wejściem bez limitu głębokości wyczerpuje stos → crash (DoS), a w niektórych środowiskach nadpisanie poza stronę guard. Dotyczy też parserów rekurencyjnych.
    desc_en: "Memory leak: allocated memory never freed — process exhausts available memory, leading to DoS or sensitive data in memory."
    lang: "c"
    vuln: |
      // PODATNE — głębokość zależna od wejścia, brak limitu
      int parse(node_t *n) {
          if (!n) return 0;
          return 1 + parse(n->child);    // wejście może wymusić miliony ramek
      }
    safe: |
      // BEZPIECZNE — limit głębokości lub iteracja z jawnym stosem
      int parse(node_t *n, int depth) {
          if (!n) return 0;
          if (depth > MAX_DEPTH) { errno = ELOOP; return -1; }
          return 1 + parse(n->child, depth + 1);
      }
  - id: "12.8"
    name: "Uninitialized Memory / niezainicjowane zmienne"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-457"
      - "CWE-908"
    desc: |
      Użycie pamięci przed inicjalizacją zwraca wartości resztkowe (poprzednia zawartość sterty/stosu) — wyciek wrażliwych danych lub niedeterministyczne błędy bezpieczeństwa.
    desc_en: "Uninitialized memory: variable used without initialization — leaks stack/heap values (info disclosure), undefined behavior, potential RCE."
    lang: "c"
    vuln: |
      // PODATNE — wysyłka struktury z paddingiem/niewypełnionymi polami
      struct msg m;
      m.type = 1;                         // m.flags i padding niezainicjowane
      send(fd, &m, sizeof(m), 0);        // wyciek resztek pamięci
    safe: |
      // BEZPIECZNE — wyzeruj cały obszar przed użyciem
      struct msg m;
      memset(&m, 0, sizeof(m));
      m.type = 1;
      send(fd, &m, sizeof(m), 0);
  - id: "12.9"
    name: "Use-After-Free w Rust (unsafe / FFI)"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-416"
      - "CWE-825"
    desc: |
      Bezpieczeństwo pamięci Rusta gwarantuje borrow checker, ale bloki unsafe i FFI mogą je złamać — surowe wskaźniki przeżywające właściciela, Vec realokowany podczas trzymania wskaźnika.
    desc_en: "Unsafe Rust: `unsafe` block with pointer arithmetic without bounds checking — loses Rust's memory safety guarantees."
    lang: "rust"
    vuln: |
      // PODATNE — surowy wskaźnik staje się dangling po realokacji
      let mut v = vec![1, 2, 3];
      let p = v.as_ptr();
      v.push(4);                          // realokacja -> p dangling
      let _x = unsafe { *p };             // UAF
    safe: |
      // BEZPIECZNE — używaj indeksów/slice'ów, nie surowych wskaźników przez realokację
      let mut v = vec![1, 2, 3];
      v.push(4);
      let x = v[0];                       // borrow checker pilnuje ważności
  - id: "12.10"
    name: "Data Race przez unsafe współdzielenie (Go/Rust/C)"
    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-362"
      - "CWE-366"
    desc: |
      Współbieżny dostęp do tej samej pamięci bez synchronizacji powoduje rozdarte odczyty/zapisy, korupcję map (Go: fatal concurrent map write) i niezdefiniowane zachowanie. W C/C++ to UB prowadzące do korupcji.
    desc_en: "Out-of-bounds read: reading beyond an array boundary — info disclosure (adjacent memory values, stack canary, heap addresses), enabling ASLR bypass."
    lang: "go"
    vuln: |
      // PODATNE — współbieżny zapis do mapy bez locka
      m := map[string]int{}
      for i := 0; i < 100; i++ {
          go func() { m["k"]++ }()        // fatal error: concurrent map writes
      }
    safe: |
      // BEZPIECZNE — synchronizacja (mutex) lub sync.Map
      var mu sync.Mutex
      m := map[string]int{}
      for i := 0; i < 100; i++ {
          go func() { mu.Lock(); m["k"]++; mu.Unlock() }()
      }
  - id: "12.11"
    name: "Dangling Pointer"
    severity: "High"
    difficulty: "Hard"
    confidence: "IRON"
    cwe:
      - "CWE-416"
      - "CWE-825"
    desc: |
      Użycie wskaźnika po zwolnieniu/do niezainicjowanej pamięci (use-after-free / wild pointer).
    desc_en: "Stack overflow: deep or infinite recursion exhausts the stack — crash (DoS)."
    lang: "c"
    vuln: |
      free(p);
      use(p);  // dangling pointer
    safe: |
      free(p);
      p = NULL;  // zapobiega ponownemu użyciu
      if (p) use(p);
  - id: "12.12"
    name: "Format String Vulnerability"
    severity: "High"
    difficulty: "Medium"
    confidence: "IRON"
    cwe:
      - "CWE-134"
    desc: |
      Nieufny input jako format string pozwala czytać/zapisywać pamięć (%n).
    desc_en: "Heap overflow: writing beyond a heap-allocated buffer — overwrites adjacent heap chunks' metadata, enabling heap exploitation."
    lang: "c"
    vuln: |
      printf(user_input);  // user_input="%x%x%n"
    safe: |
      printf("%s", user_input);  // input jako argument
  - id: "12.13"
    name: "Integer Overflow Memory"
    severity: "High"
    difficulty: "Hard"
    confidence: "IRON"
    cwe:
      - "CWE-190"
      - "CWE-191"
      - "CWE-193"
    desc: |
      Przepełnienie/niedopełnienie liczby całkowitej daje za mały bufor lub błędny indeks -> korupcja pamięci.
    desc_en: "Type confusion: casting a pointer to an incompatible type — reads/writes memory with an incorrect layout, leading to info disclosure or RCE."
    lang: "c"
    vuln: |
      int size = a * b;        // overflow
      char *buf = malloc(size); // za mały
    safe: |
      if (b != 0 && a > SIZE_MAX / b) return -1;  // detekcja overflow
      size_t size = (size_t)a * b;
      char *buf = malloc(size);
