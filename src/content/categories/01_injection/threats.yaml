    desc: |
      Eksport do CSV/XLSX z polami zaczynającymi się od =,+,-,@ — Excel/Sheets wykonuje je jako formuły (exfiltracja danych, wywołanie poleceń DDE).
    lang: "python"
    vuln: |
      # PODATNE — pole użytkownika wprost do CSV
      writer.writerow([user.name, user.note])
      # note = "=cmd|'/c calc'!A1"
    safe: |
      # BEZPIECZNE — prefiksuj komórki zaczynające się od metaznaków
      def esc(v):
          return "'" + v if v and v[0] in "=+-@\t\r" else v
      writer.writerow([esc(user.name), esc(user.note)])
