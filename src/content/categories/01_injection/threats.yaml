threats:
  - id: "1.1"
    name: "SQL Injection"
    severity: "Critical"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-89"
    desc: |
      Nieufny input trafia do zapytania SQL przez konkatenację stringów, pozwalając atakującemu zmienić strukturę zapytania (wyciek, modyfikacja, bypass auth).
    lang: "python"
    vuln: |
      # PODATNE — konkatenacja
      def get_user(conn, username):
          q = "SELECT * FROM users WHERE name = '" + username + "'"
          return conn.execute(q).fetchall()
      # atak: username = "' OR '1'='1' --"
    safe: |
      # BEZPIECZNE — parametryzacja (prepared statement)
      def get_user(conn, username):
          q = "SELECT * FROM users WHERE name = %s"
          return conn.execute(q, (username,)).fetchall()
    note: "ORMy nie chronią automatycznie — Model.objects.raw(), .extra(), text() w SQLAlchemy, raw fragmenty nadal są podatne."
  - id: "1.2"
    name: "NoSQL Injection"
    severity: "High"
    difficulty: "Medium"
    confidence: "IRON"
    cwe:
      - "CWE-943"
    desc: |
      Wstrzyknięcie operatorów zapytań (np. MongoDB $gt, $ne, $where) gdy input jest deserializowany jako obiekt zapytania. Częste w API przyjmujących JSON.
    lang: "python"
    vuln: |
      # PODATNE — JSON body trafia wprost do filtra
      user = db.users.find_one({"user": req.json["user"], "pass": req.json["pass"]})
      # atak: {"user":"admin","pass":{"$ne":null}} -> logowanie bez hasła
    safe: |
      # BEZPIECZNE — wymuś typy skalarne
      username = str(req.json["user"]); password = str(req.json["pass"])
      user = db.users.find_one({"user": username, "pass": password})
  - id: "1.3"
    name: "OS Command Injection"
    severity: "Critical"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-78"
    desc: |
      Nieufny input trafia do polecenia powłoki, pozwalając na wykonanie dowolnych komend systemowych.
    lang: "python"
    vuln: |
      # PODATNE — shell=True + konkatenacja
      import os, subprocess
      os.system("ping -c 1 " + host)
      subprocess.run("convert " + filename + " out.png", shell=True)
      # atak: host = "8.8.8.8; rm -rf /"
    safe: |
      # BEZPIECZNE — argv list, bez shella
      subprocess.run(["ping", "-c", "1", host], shell=False)
  - id: "1.4"
    name: "LDAP Injection"
    severity: "High"
    difficulty: "Medium"
    confidence: "IRON"
    cwe:
      - "CWE-90"
    desc: |
      Wstrzyknięcie metaznaków filtra LDAP (*, (, ), \) do zapytania directory, omijając filtry auth.
    lang: "python"
    vuln: |
      # PODATNE
      flt = "(&(uid=" + user + ")(password=" + pwd + "))"
      # atak: user = "*)(uid=*))(|(uid=*"
    safe: |
      # BEZPIECZNE — escape wg RFC 4515
      from ldap3.utils.conv import escape_filter_chars
      flt = "(&(uid=%s)(password=%s))" % (escape_filter_chars(user), escape_filter_chars(pwd))
