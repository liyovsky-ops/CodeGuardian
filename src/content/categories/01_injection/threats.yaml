  - id: "1.6"
    name: "Template Injection (SSTI)"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-1336"
      - "CWE-94"
    desc: |
      Nieufny input trafia jako szablon (nie jako dane szablonu) do silnika (Jinja2, Twig, Freemarker), co prowadzi do RCE przez dostęp do obiektów Pythona.
    lang: "python"
    vuln: |
      # PODATNE — input jako string szablonu
      from jinja2 import Template
      Template("Hello " + user_input).render()
      # atak: user_input = "{{ ''.__class__.__mro__[1].__subclasses__() }}" -> ścieżka do RCE
    safe: |
      # BEZPIECZNE — input jako dane, nie szablon
      Template("Hello {{ name }}").render(name=user_input)
  - id: "1.7"
    name: "Log Injection / Log Forging"
    severity: "Medium"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-117"
    desc: |
      Nieufny input ze znakami nowej linii / sekwencjami ANSI trafia do logów, pozwalając fałszować wpisy, wstrzykiwać do SIEM, lub XSS w logach. Szczególny przypadek: Log4Shell — interpolacja ${jndi:...}.
    lang: "python"
    vuln: |
      # PODATNE
      logger.info("Login failed for user: " + username)
      # atak: username = "admin\n2026-01-01 INFO Login OK for user: admin"
    safe: |
      # BEZPIECZNE — sanityzuj newline / loguj strukturalnie
      logger.info("Login failed", extra={"user": username.replace("\n"," ").replace("\r"," ")})
    note: "Severity rośnie do High jeśli interpolacja typu Log4Shell."
  - id: "1.8"
    name: "CRLF / HTTP Response Splitting / Header Injection"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-93"
      - "CWE-113"
    desc: |
      Nieufny input ze znakami \r\n trafia do nagłówka HTTP/odpowiedzi, pozwalając wstrzyknąć dodatkowe nagłówki, ciasteczka lub rozbić odpowiedź (cache poisoning, XSS).
    lang: "python"
    vuln: |
      # PODATNE — input do nagłówka bez sanityzacji
      resp.headers["Location"] = "/back?to=" + request.args["to"]
      # atak: to = "x\r\nSet-Cookie: admin=1"
    safe: |
      # BEZPIECZNE — odrzuć CR/LF, użyj API kodującego nagłówki
      v = request.args["to"]
      if "\r" in v or "\n" in v: abort(400)
      resp.headers["Location"] = "/back?to=" + quote(v)
  - id: "1.9"
    name: "Host Header Injection"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-644"
    desc: |
      Aplikacja ufa nagłówkowi Host przy budowie linków (reset hasła) lub routingu — atakujący podstawia własną domenę (password reset poisoning, cache poisoning).
    lang: "python"
    vuln: |
      # PODATNE — link resetu z nagłówka Host
      link = f"https://{request.headers['Host']}/reset?t={token}"
      send_email(user, link)   # atak: Host: evil.com -> token leci do atakującego
    safe: |
      # BEZPIECZNE — używaj skonfigurowanej zaufanej domeny + allowlist Host
      link = f"https://{settings.CANONICAL_HOST}/reset?t={token}"
