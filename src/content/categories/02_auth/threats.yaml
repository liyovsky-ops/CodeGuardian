  - id: "2.18"
    name: "Session Fixation"
    severity: "High"
    difficulty: "Medium"
    confidence: "IRON"
    cwe:
      - "CWE-384"
    desc: |
      Brak regeneracji identyfikatora sesji po zalogowaniu pozwala napastnikowi utrwalić znany mu session ID (fixation) lub przejąć sesję.
    desc_en: "The application uses user-controlled input (role field in body, URL param) to determine permissions instead of trusting a signed, server-controlled session."
    lang: "python"
    vuln: |
      @app.route('/login', methods=['POST'])
      def login():
          if check(request.form):
              session['uid'] = uid  # ten sam session id sprzed logowania
    safe: |
      @app.route('/login', methods=['POST'])
      def login():
          if check(request.form):
              session.clear()
              app.session_interface.regenerate(session)  # nowy id
              session['uid'] = uid
