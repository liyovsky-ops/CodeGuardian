    desc: |
      Brak tokena anty-CSRF pozwala stronie trzeciej wymusić akcję w imieniu zalogowanego użytkownika.
    desc_en: "OAuth: using `state` parameter without CSRF protection, using `code` flow without PKCE, redirect_uri validation bypass, token leakage via Referer header."
    lang: "python"
    vuln: |
      @app.route('/transfer', methods=['POST'])
      def transfer():
          do_transfer(request.form['to'], request.form['amt'])  # brak CSRF token
    safe: |
      from flask_wtf.csrf import CSRFProtect
      csrf = CSRFProtect(app)
      @app.route('/transfer', methods=['POST'])
      def transfer():
          do_transfer(request.form['to'], request.form['amt'])  # token weryfikowany
