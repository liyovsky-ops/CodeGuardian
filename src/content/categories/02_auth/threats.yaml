  - id: "2.27"
    name: "JWT None Algorithm"
    severity: "Critical"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-347"
    desc: |
      Akceptowanie algorytmu "none" lub brak wymuszenia algorytmu pozwala sfałszować token JWT.
    lang: "python"
    vuln: |
      import jwt
      claims = jwt.decode(token, verify=False)  # alg=none akceptowany
    safe: |
