threats:
  - id: "2.1"
    name: "Broken Authentication"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-287"
      - "CWE-307"
    desc: |
      Wadliwy mechanizm logowania: brak rate-limitu (brute force), przewidywalne resety hasła, akceptowanie pustych/domyślnych haseł, brak weryfikacji starego hasła przy zmianie.
    desc_en: "Flawed login mechanism: missing rate limit (brute force), predictable password resets, accepting empty/default passwords, missing old-password verification on change."
    lang: "python"
    vuln: |
      # PODATNE — brak limitu prób, porównanie w plaintext
      if user.password == request.form["password"]: login(user)
    safe: |
      # BEZPIECZNE — hash o stałym czasie + rate limit + lockout
      import bcrypt
      if rate_limiter.allow(ip) and bcrypt.checkpw(pwd.encode(), user.pw_hash):
          login(user)
  - id: "2.2"
    name: "IDOR (Insecure Direct Object Reference)"
    severity: "High"
    difficulty: "Very Hard"
    confidence: "IRON"
    cwe:
      - "CWE-639"
      - "CWE-284"
    desc: |
      Aplikacja używa identyfikatora dostarczonego przez użytkownika do dostępu do obiektu BEZ sprawdzenia, czy ten użytkownik ma do niego prawo. Klasyk „Broken Object Level Authorization” (BOLA, OWASP API #1).
    desc_en: "The application uses a user-supplied identifier to access an object WITHOUT verifying that this user is authorized. Classic Broken Object Level Authorization (BOLA, OWASP API #1)."
    lang: "python"
    vuln: |
      # PODATNE — pobiera po id z URL, brak sprawdzenia własności
      @app.get("/invoice/<int:id>")
      def invoice(id):
          return Invoice.query.get(id).to_json()
      # atak: /invoice/1, /invoice/2, ... -> cudze faktury
    safe: |
      # BEZPIECZNE — scope do zalogowanego użytkownika
      @app.get("/invoice/<int:id>")
      def invoice(id):
          inv = Invoice.query.filter_by(id=id, owner_id=current_user.id).first_or_404()
          return inv.to_json()
    note: "Severity rośnie do Critical jeśli dane wrażliwe / masowy enumerator."
    note_en: "Severity escalates to Critical for sensitive data or mass enumerators."
  - id: "2.3"
    name: "Privilege Escalation"
    severity: "Critical"
    difficulty: "Very Hard"
    confidence: "IRON"
    cwe:
      - "CWE-269"
    desc: |
      Użytkownik uzyskuje uprawnienia ponad swój poziom — pionowa (user→admin) lub pozioma (user A → zasoby user B). Często przez ufanie polu roli z requestu lub brak re-walidacji uprawnień przy akcji.
    desc_en: "A user gains permissions beyond their level — vertically (user→admin) or horizontally (user A → resources of user B). Often caused by trusting a role field from the request or missing re-validation of permissions at action time."
    lang: "python"
    vuln: |
      # PODATNE — rola brana z body requestu
      user.role = request.json.get("role", "user")  # atak: {"role":"admin"}
    safe: |
      # BEZPIECZNE — rola tylko z trusted source, zmiana roli za osobnym authz
      if current_user.is_admin: target.role = validated_role
  - id: "2.4"
    name: "JWT Issues"
    severity: "Critical"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-347"
    desc: |
      Wadliwa obsługa tokenów: akceptowanie alg:none, confusion RS256↔HS256 (klucz publiczny użyty jako sekret HMAC), brak weryfikacji exp/aud/iss, sekret słaby/hardcoded, brak rewokacji.
    desc_en: "Broken Function Level Authorization (BFLA) — a lower-privileged user can call admin-level endpoints by guessing URLs or using a captured admin request."
    lang: "python"
    vuln: |
      # PODATNE — brak wymuszenia algorytmu, brak weryfikacji
      jwt.decode(token, key, options={"verify_signature": False})
      jwt.decode(token, key)  # przyjmie alg z nagłówka -> alg confusion / none
    safe: |
      # BEZPIECZNE — przypnij algorytm i waliduj claims
      jwt.decode(token, key, algorithms=["RS256"], audience="my-api", issuer="my-iss")
  - id: "2.5"
    name: "Session Management"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-384"
      - "CWE-613"
      - "CWE-1004"
    desc: |
      Słabe ID sesji (przewidywalne), brak rotacji po logowaniu (session fixation), brak invalidacji po wylogowaniu, cookie bez HttpOnly/Secure/SameSite, zbyt długi TTL.
    desc_en: "JWT `alg` field is controlled by the attacker: `alg: none` bypasses signature; RS256→HS256 swap uses the public key as an HMAC secret to forge tokens."
    lang: "python"
    vuln: |
      # PODATNE
      resp.set_cookie("sid", session_id)  # brak flag, brak rotacji po loginie
    safe: |
      # BEZPIECZNE
      session.regenerate_id()  # po udanym logowaniu (anty-fixation)
      resp.set_cookie("sid", sid, httponly=True, secure=True, samesite="Lax", max_age=3600)
  - id: "2.6"
    name: "Missing Function-Level Authorization"
    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-862"
    desc: |
      Endpoint administracyjny chroniony tylko ukryciem w UI („security by obscurity”), ale dostępny bezpośrednio. OWASP API #5 (BFLA).
    desc_en: "A short or guessable JWT secret can be brute-forced offline (e.g., hashcat dictionary attack), allowing forgery of any token."
    lang: "python"
    vuln: |
      # PODATNE — brak dekoratora authz na akcji admina
      @app.post("/admin/delete-user")
      def delete_user(): ...
    safe: |
      # BEZPIECZNE
      @app.post("/admin/delete-user")
      @require_role("admin")
      def delete_user(): ...
  - id: "2.7"
    name: "Account Enumeration"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-203"
      - "CWE-204"
    desc: |
      Różne komunikaty/czasy odpowiedzi dla istniejącego vs nieistniejącego konta (login, reset, rejestracja) pozwalają zbudować listę ważnych użytkowników.
    desc_en: "Insecure HTTP cookies: missing Secure flag (transmitted over HTTP), missing HttpOnly (accessible via JS), missing SameSite (CSRF), no expiry, overly broad Path/Domain."
    lang: "python"
    vuln: |
      # PODATNE — różne komunikaty
      if not user: return "Nie ma takiego użytkownika"
      if not check(pwd): return "Złe hasło"
    safe: |
      # BEZPIECZNE — jednolity komunikat + stały czas (hash zawsze liczony)
      ok = user and bcrypt.checkpw(pwd, user.hash or DUMMY_HASH)
      if not ok: return "Nieprawidłowy login lub hasło"
  - id: "2.8"
    name: "Password Reset Poisoning / słaby reset"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-640"
    desc: |
      Token resetu przewidywalny, bez wygaśnięcia, wielokrotnego użycia, lub link budowany z nagłówka Host (zob. 1.9) — przejęcie konta.
    desc_en: "Session token generated with a PRNG (random/Math.random) instead of a CSPRNG — predictable, allowing session prediction."
    lang: "python"
    vuln: |
      # PODATNE — token z PRNG, bez TTL, link z Host
      token = str(random.randint(0,10**6))
      link = f"https://{request.headers['Host']}/reset?t={token}"
    safe: |
      # BEZPIECZNE — kryptograficzny token, krótki TTL, single-use, kanoniczny host
      token = secrets.token_urlsafe(32)
      store(token, user, ttl=900, used=False)
  - id: "2.9"
    name: "MFA Bypass / słaba 2FA"
    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-287"
      - "CWE-308"
    desc: |
      Pominięcie kroku MFA (bezpośrednie wywołanie kolejnego endpointu), brak rate-limitu na kod OTP (brute 6 cyfr), kod bez powiązania z sesją, akceptacja po wygaśnięciu.
    desc_en: "API key or token stored in client-side code (JS, mobile app), public GitHub repo, or environment variable exposed in logs/env dump."
    lang: "python"
    vuln: |
      # PODATNE — brak limitu, kod globalny, brak powiązania z sesją
      if request.form["otp"] == cached_otp: grant_full_access()
    safe: |
      # BEZPIECZNE — limit prób, TOTP stałoczasowo, kod związany z user+czasem
      if rate_limiter.allow(user) and pyotp.TOTP(user.secret).verify(otp, valid_window=1):
          grant_full_access()
  - id: "2.10"
    name: "OAuth / OIDC flaws"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-352"
      - "CWE-601"
    desc: |
      Brak/słaba walidacja state (CSRF na callbacku), brak PKCE w klientach publicznych, luźny redirect_uri (open redirect → kradzież code/token), brak weryfikacji aud/iss w ID tokenie, mieszanie implicit flow.
    desc_en: "Password reset link or token is reused after use, does not expire, or is sent over HTTP — allowing token theft and account takeover."
    lang: "python"
    vuln: |
      # PODATNE — brak walidacji state, redirect_uri z parametru
      return redirect(idp_url + "&redirect_uri=" + request.args["ru"])
      # callback nie sprawdza state -> CSRF / przejęcie code
    safe: |
      # BEZPIECZNE — losowy state w sesji + PKCE + dokładny redirect_uri
      state = secrets.token_urlsafe(16); session["oauth_state"]=state
      # na callbacku: assert request.args["state"] == session.pop("oauth_state")
  - id: "2.11"
    name: "JWT 'kid' / JWK injection"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-347"
      - "CWE-345"
    desc: |
      Nagłówek JWT (kid, jku, x5u) sterowany przez atakującego — kid path traversal/SQLi do wyboru klucza, jku wskazujące na klucz atakującego, osadzony jwk akceptowany jako zaufany.
    desc_en: "Mass assignment: the framework maps all request fields onto the model, allowing setting of privileged fields (role, is_admin, price) not intended for user input."
    lang: "python"
    vuln: |
      # PODATNE — klucz wybierany po kid z tokena, jku zaufane
      hdr = jwt.get_unverified_header(token)
      key = open("keys/" + hdr["kid"]).read()   # kid traversal
      jwt.decode(token, key)
    safe: |
      # BEZPIECZNE — kid tylko jako klucz mapy zaufanych kluczy, ignoruj jku/x5u
      key = TRUSTED_KEYS.get(hdr["kid"]) or abort(401)
      jwt.decode(token, key, algorithms=["RS256"])
  - id: "2.12"
    name: "Credential Stuffing / brak ochrony przed reuse haseł"
    severity: "High"
    difficulty: "Medium"
    confidence: "IRON"
    cwe:
      - "CWE-307"
      - "CWE-799"
    desc: |
      Brak detekcji masowych logowań skradzionymi parami login:hasło (z wycieków). Wymaga limitów, anomalii, sprawdzania haseł w bazach wycieków (k-anonimity HIBP).
    desc_en: "Missing or misconfigured MFA: easily bypassed OTP (length, no rate limit), recovery codes stored in plaintext, MFA optional on admin accounts."
    lang: "python"
    vuln: |
      # PODATNE — login bez limitu na konto/IP, akceptuje znane wyciekłe hasła
      def login(u,p): return check(u,p)
    safe: |
      # BEZPIECZNE — rate limit + device fingerprint + odrzuć hasła z wycieków
      if pwned_count(p) > 0: reject("hasło w znanych wyciekach")
      if anomaly_detector.suspicious(ip,u): require_captcha()
  - id: "2.13"
    name: "Logout / brak invalidacji tokenów (rewokacja)"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-613"
    desc: |
      JWT/sesje pozostają ważne po wylogowaniu lub zmianie hasła — brak listy unieważnień / krótkiego TTL + refresh. Skradziony token działa do exp.
    desc_en: "JWT payload or header contains sensitive information (email, role, internal IDs) readable without the private key — the payload is only base64-encoded, not encrypted."
    lang: "python"
    vuln: |
      # PODATNE — JWT 24h bez rewokacji, logout tylko czyści cookie
      def logout(): resp.delete_cookie("jwt")   # token nadal ważny
    safe: |
      # BEZPIECZNE — krótki access token + refresh w bazie z rewokacją / denylist jti
      revoked.add(claims["jti"], ttl=token_remaining)
    note: "High dla długożyjących JWT bez rewokacji."
  - id: "2.14"
    name: "Brute Force Attacks"
    severity: "High"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-307"
      - "CWE-799"
    desc: |
      Brak limitu prób / lockoutu pozwala na masowe próby logowania (brute force, credential stuffing, password spraying).
    desc_en: "After logout, the JWT or session token is not invalidated on the server — an attacker who captured it can continue using it."
    lang: "python"
    vuln: |
      @app.route('/login', methods=['POST'])
      def login():
          return ok() if verify(u, p) else fail()  # brak rate limit
    safe: |
      from limits import RateLimiter
      @app.route('/login', methods=['POST'])
      @rate_limit('5/minute', key='ip+username')
      def login():
          return ok() if verify(u, p) else fail()
  - id: "2.15"
    name: "Cross-Site Request Forgery (CSRF)"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "IRON"
    cwe: []
    desc: |
      Cross-Site Request Forgery (CSRF) — zagrożenie z kategorii Authentication & Authorization wskazane przez audyt arena. Wymaga walidacji wejścia i kontroli po stronie serwera.
    desc_en: "Authentication bypass via SQL injection or logical condition in login form — e.g., `' OR '1'='1` in the username bypasses password check."
    lang: "python"
    vuln: |
      # PODATNE — Cross-Site Request Forgery (CSRF)
      # brak walidacji / kontroli (przykład poglądowy)
      result = handle(untrusted_input)
    safe: |
      # BEZPIECZNE — Cross-Site Request Forgery (CSRF)
      # waliduj wejście, stosuj allowlistę i least privilege
      if not is_valid(untrusted_input):
          raise ValueError('odrzucone')
      result = handle(untrusted_input)
  - id: "2.16"
    name: "CSRF"
    severity: "High"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
