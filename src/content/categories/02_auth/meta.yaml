id: "auth"
num: 2
name: "Authentication & Authorization"
icon: "🔑"
color: "#ffa94d"
difficulty: "Hard → Very Hard"
desc: |
  Authentication = „kim jesteś”. Authorization = „co ci wolno”. Najgroźniejsze błędy aplikacyjne — często niewidoczne dla SAST, bo to logika, nie wzorzec.
verdict: |
  To logika domenowa. SAST nie wie, że Invoice.get(id) powinno sprawdzać własność. Wykrywalne wzorce: verify_signature:False, alg:none, cookie bez flag, hardcoded JWT secret. Reszta wymaga modelu uprawnień. IDOR/BOLA/BFLA wykrywa się najlepiej runtime (testy z dwoma kontami).
