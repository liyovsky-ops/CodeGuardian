      # PODATNE — liczba iteracji KDF / rozmiar obrazu z requestu
      bcrypt.hashpw(pwd, bcrypt.gensalt(rounds=request.json["cost"]))  # cost=31
      Image.open(f).resize((req.w, req.h))   # 100000x100000 -> CPU/MEM bomb
    safe: |
      # BEZPIECZNE — stałe/ograniczone parametry kosztu + timeout + limity wymiarów
      cost = 12                              # serwer ustala, nie klient
      if req.w * req.h > 25_000_000: abort(400)
