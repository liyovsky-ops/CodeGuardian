threats:
  - id: "14.1"
    name: "ReDoS (Regular Expression DoS)"
    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-1333"
      - "CWE-400"
    desc: |
      Regex z katastrofalnym backtrackingiem (zagnieżdżone/nakładające się kwantyfikatory) na spreparowanym wejściu rośnie wykładniczo w czasie — jeden request blokuje wątek/proces.
    lang: "javascript"
    vuln: |
      // PODATNE — nakładające się kwantyfikatory
      const re = /^(a+)+$/;
      re.test("aaaaaaaaaaaaaaaaaaaaaaaa!");   // wykładnicze backtracking -> zawis
    safe: |
      // BEZPIECZNE — regex bez zagnieżdżeń, limit długości, silnik liniowy (RE2)
      const re = /^a+$/;                     // równoważne, liniowe
      if (input.length > 256) reject();     // + ogranicz wejście
  - id: "14.2"
    name: "Zip Bomb / Decompression Bomb"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-409"
      - "CWE-400"
    desc: |
      Małe archiwum (np. 42 KB) rozpakowuje się do terabajtów (zagnieżdżone/zduplikowane warstwy) — wyczerpanie dysku/pamięci. Dotyczy ZIP, gzip, brotli, obrazów (PNG/zlib).
    lang: "python"
    vuln: |
      # PODATNE — rozpakowanie bez limitu rozmiaru
      import zipfile
      with zipfile.ZipFile(uploaded) as z:
          z.extractall(dest)               # 42.zip -> 4.5 PB
    safe: |
      # BEZPIECZNE — limit rozmiaru i liczby plików, sprawdzaj file_size z nagłówka
      MAX = 100 * 1024 * 1024
      total = 0
      with zipfile.ZipFile(uploaded) as z:
          for info in z.infolist():
              total += info.file_size
              if total > MAX or info.file_size > MAX: abort(413)
          z.extractall(dest)
  - id: "14.3"
    name: "Billion Laughs / XML Entity Expansion"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-776"
      - "CWE-400"
    desc: |
      Rekurencyjne encje XML (lub parametryczne) rozwijają się wykładniczo (kilka KB → gigabajty w pamięci) → DoS. Wariant: encje zewnętrzne (zob. też XXE).
    lang: "python"
    vuln: |
      # PODATNE — parser z włączoną ekspansją encji
      import xml.etree.ElementTree as ET
      ET.fromstring(data)
      # <!ENTITY lol "lol"><!ENTITY lol2 "&lol;&lol;...">... -> miliardy "lol"
    safe: |
      # BEZPIECZNE — defusedxml blokuje bomby encji i DTD
      from defusedxml.ElementTree import fromstring
      fromstring(data)                     # rzuca EntitiesForbidden
  - id: "14.4"
    name: "Brak rate limiting (flood / brute / abuse)"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-770"
      - "CWE-799"
    desc: |
      Endpoint bez limitu liczby żądań pozwala na flood (DoS), brute force, scraping i abuse kosztowy (SMS, e-mail, LLM). OWASP API #4.
    lang: "python"
    vuln: |
      # PODATNE — kosztowny endpoint bez limitu
      @app.post("/search")
      def search(): return expensive_full_scan(request.json["q"])
    safe: |
      # BEZPIECZNE — limit per IP/konto + backoff
      from flask_limiter import Limiter
      @limiter.limit("10/minute")
      @app.post("/search")
      def search(): return expensive_full_scan(request.json["q"])
  - id: "14.5"
    name: "Unbounded input / brak limitu rozmiaru body"
    severity: "Medium"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-770"
      - "CWE-400"
    desc: |
      Brak limitu rozmiaru żądania/uploadu/liczby pól pozwala wysłać gigabajtowe body i wyczerpać pamięć lub dysk jednym requestem.
    lang: "python"
    vuln: |
      # PODATNE — czyta całe body do pamięci bez limitu
      @app.post("/upload")
      def upload():
          data = request.get_data()        # dowolny rozmiar -> OOM
          return process(data)
    safe: |
      # BEZPIECZNE — twardy limit rozmiaru body na poziomie frameworka
      app.config["MAX_CONTENT_LENGTH"] = 8 * 1024 * 1024   # 8 MB, request -> 413
  - id: "14.6"
    name: "Memory exhaustion (nieograniczone struktury w pamięci)"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-789"
      - "CWE-400"
    desc: |
      Alokacja struktury o rozmiarze sterowanym wejściem (lista o długości z requestu, cache bez eviction, akumulacja w pamięci) → OOM i ubicie procesu.
    lang: "python"
    vuln: |
      # PODATNE — rozmiar alokacji z wejścia, cache bez limitu
      rows = [Row() for _ in range(request.json["count"])]   # count=10**9 -> OOM
      CACHE[key] = big_value                                  # rośnie bez końca
    safe: |
      # BEZPIECZNE — limit rozmiaru + cache z eviction (LRU)
      count = min(int(request.json["count"]), 10_000)
      rows = [Row() for _ in range(count)]
      from functools import lru_cache         # ograniczony rozmiar
  - id: "14.7"
    name: "Algorithmic Complexity Attack (hash flooding, quadratic)"
    severity: "Medium"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-407"
      - "CWE-400"
    desc: |
      Spreparowane wejście wymusza najgorszy przypadek algorytmu: kolizje hashy (O(n) lookup → O(n²) na całości), sortowanie quadratic, parsery o złej złożoności.
    lang: "python"
    vuln: |
      # PODATNE — wiele wartości kolidujących w jednym kuble hash
      # atakujący wysyła N kluczy o tym samym hashu -> insert/lookup O(n^2)
      for k in attacker_keys: d[k] = 1     # degeneracja do listy
    safe: |
      # BEZPIECZNE — randomizacja seedu hash (Python: PYTHONHASHSEED domyślnie ON),
      # limit liczby pól, struktury odporne (drzewa) na granicy zaufania
      if len(attacker_keys) > MAX_FIELDS: abort(400)
  - id: "14.8"
