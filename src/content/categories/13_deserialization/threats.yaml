threats:
  - id: "13.1"
    name: "Python Pickle RCE"
    severity: "Critical"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-502"
    desc: |
      pickle.loads na nieufnych danych wykonuje dowolny kod przez metodę __reduce__ obiektu. Każdy pickle z zewnątrz = potencjalne RCE.
    desc_en: "Python pickle.loads() on untrusted data: `__reduce__` method allows arbitrary code execution during deserialization."
    lang: "python"
    vuln: |
      # PODATNE — deserializacja danych z sieci/cookie
      import pickle
      obj = pickle.loads(request.get_data())   # __reduce__ -> os.system(...)
    safe: |
      # BEZPIECZNE — format danych, nie kodu
      import json
      obj = json.loads(request.get_data())
      # gdy konieczny pickle: tylko zaufane źródło + HMAC integralności
  - id: "13.2"
    name: "YAML unsafe load"
    severity: "Critical"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-502"
    desc: |
      yaml.load (PyYAML bez SafeLoader) interpretuje tagi typu !!python/object/apply, co pozwala konstruować dowolne obiekty i wywołać kod → RCE.
    desc_en: "Java ObjectInputStream.readObject() on untrusted data: gadget chains from available classes (Apache Commons Collections, Spring, etc.) enable RCE."
    lang: "python"
    vuln: |
      # PODATNE
      import yaml
      cfg = yaml.load(user_yaml)               # !!python/object/apply:os.system ["id"]
      cfg = yaml.load(user_yaml, Loader=yaml.Loader)  # też niebezpieczne
    safe: |
      # BEZPIECZNE — SafeLoader (tylko proste typy)
      import yaml
      cfg = yaml.safe_load(user_yaml)
  - id: "13.3"
    name: "Java Object Deserialization (gadget chains)"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-502"
    desc: |
      ObjectInputStream.readObject na nieufnym strumieniu uruchamia łańcuchy gadżetów (ysoserial: CommonsCollections, Spring) podczas deserializacji → RCE. Historyczny wektor wielu krytycznych CVE.
    desc_en: "PHP unserialize() on untrusted data: magic methods (__wakeup, __destruct, __toString) form a gadget chain leading to RCE, LFI, or SSRF."
    lang: "java"
    vuln: |
      // PODATNE — readObject na danych od klienta
      ObjectInputStream ois = new ObjectInputStream(socket.getInputStream());
      Object o = ois.readObject();          // gadget chain -> RCE
    safe: |
      // BEZPIECZNE — nie deserializuj natywnie nieufnych danych; użyj JSON
      // lub whitelist klas przez ObjectInputFilter (JEP 290)
      ois.setObjectInputFilter(ObjectInputFilter.Config.createFilter(
          "com.myapp.dto.*;java.lang.*;!*"));
  - id: "13.4"
    name: "PHP Object Injection (unserialize)"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "IRON"
    cwe:
      - "CWE-502"
    desc: |
      unserialize na nieufnym wejściu instancjonuje obiekty; magiczne metody (__wakeup, __destruct) tworzą POP chain → RCE/LFI/SQLi.
    desc_en: "YAML.load() (PyYAML/Ruby) on untrusted data: YAML allows Python/Ruby objects — !!python/object/apply:os.system executes OS commands."
    lang: "php"
    vuln: |
      // PODATNE — unserialize danych z cookie/parametru
      $obj = unserialize($_COOKIE['data']);   // POP chain przez __wakeup/__destruct
    safe: |
      // BEZPIECZNE — JSON zamiast unserialize, lub allowed_classes=false
      $obj = json_decode($_COOKIE['data'], true);
      // gdy wymuszone: unserialize($d, ['allowed_classes' => false]);
  - id: "13.5"
    name: "XML Deserialization (XMLDecoder / XStream)"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-502"
      - "CWE-611"
    desc: |
      Deserializatory XML mapujące XML na obiekty (Java XMLDecoder, XStream bez whitelisty, .NET BinaryFormatter/LosFormatter) wykonują kod z tagów typu <object class=...> → RCE.
    desc_en: "Ruby Marshal.load() on untrusted data: arbitrary object instantiation during deserialization — RCE via gadget chains."
    lang: "java"
    vuln: |
      // PODATNE — XMLDecoder wykonuje konstrukcje z XML
      XMLDecoder d = new XMLDecoder(request.getInputStream());
      Object o = d.readObject();            // <object class="java.lang.Runtime">... -> RCE
    safe: |
      // BEZPIECZNE — nie używaj XMLDecoder do nieufnego XML;
      // XStream z jawną whitelistą typów (allowTypes), albo prosty parser DTO
      xstream.addPermission(NoTypePermission.NONE);
      xstream.allowTypes(new Class[]{Dto.class});
  - id: "13.6"
    name: "Ruby Marshal / YAML.load RCE"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-502"
    desc: |
      Marshal.load i YAML.load (Psych) w Ruby na nieufnych danych instancjonują dowolne klasy → gadget chain i RCE. Historycznie wektor podatności w Rails.
    desc_en: ".NET BinaryFormatter/NetDataContractSerializer on untrusted data: gadget chains from available types enable RCE."
    lang: "ruby"
    vuln: |
      # PODATNE
      obj = Marshal.load(params[:data])        # dowolne obiekty -> RCE
      obj = YAML.load(params[:cfg])            # Psych -> instancjonowanie klas
    safe: |
      # BEZPIECZNE — JSON, albo YAML.safe_load z ograniczonymi typami
      require 'json'
      obj = JSON.parse(params[:data])
      cfg = YAML.safe_load(params[:cfg], permitted_classes: [Symbol])
  - id: "13.7"
    name: ".NET BinaryFormatter / TypeNameHandling"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-502"
    desc: |
      BinaryFormatter/SoapFormatter/NetDataContractSerializer oraz Json.NET z TypeNameHandling.All osadzają nazwy typów .NET — atakujący wskazuje typ-gadżet (ObjectDataProvider) → RCE.
    desc_en: "JSON deserialization with polymorphic type information (Jackson `@class`, Gson with RuntimeTypeAdapterFactory) — attacker controls the target class, enabling gadget chain."
    lang: "csharp"
    vuln: |
      // PODATNE — BinaryFormatter / Json.NET z type handling
      var obj = new BinaryFormatter().Deserialize(stream);
      JsonConvert.DeserializeObject(json,
          new JsonSerializerSettings{ TypeNameHandling = TypeNameHandling.All });
    safe: |
      // BEZPIECZNE — BinaryFormatter jest deprecjonowany; użyj System.Text.Json
      var dto = System.Text.Json.JsonSerializer.Deserialize<MyDto>(json);
      // Json.NET: TypeNameHandling.None (domyślne)
  - id: "13.8"
    name: "JavaScript / Node deserializacja (node-serialize, eval)"
    severity: "Critical"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-502"
      - "CWE-95"
    desc: |
      Biblioteki jak node-serialize deserializują funkcje z IIFE (_$$ND_FUNC$$_) i je wykonują; ogólnie deserializacja przez eval/Function nieufnego JSON → RCE.
    desc_en: "XML deserialization (XStream, XMLDecoder) on untrusted data: gadget chains in available Java classes enable RCE."
    lang: "javascript"
    vuln: |
      // PODATNE — node-serialize.unserialize wykonuje osadzone funkcje
      const s = require('node-serialize');
      const obj = s.unserialize(req.cookies.profile);   // _$$ND_FUNC$$_ -> RCE
    safe: |
      // BEZPIECZNE — JSON.parse (nie wykonuje kodu), walidacja schematu
      const obj = JSON.parse(req.cookies.profile);
      // + walidacja (np. zod/ajv) zanim użyjesz pól
  - id: "13.9"
    name: "Deserialization → SSRF / DoS gadgets"
    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-502"
      - "CWE-918"
    desc: |
      Nawet bez RCE, gadżety deserializacji wywołują efekty uboczne: URLDNS (SSRF/wyciek DNS), gadżety hashujące/rekurencyjne (DoS), odczyt plików. Niższy próg eksploatacji niż pełne RCE.
    desc_en: "MessagePack/Avro/Thrift deserialization without schema validation — untrusted binary data exploits type confusion."
    lang: "java"
    vuln: |
      // PODATNE — readObject z gadżetem URLDNS (java.net.URL w HashMap)
      // deserializacja wykonuje URL.hashCode() -> rozwiązanie DNS atakującego
      Object o = ois.readObject();          // SSRF / DNS exfiltration
    safe: |
      // BEZPIECZNE — ObjectInputFilter z whitelistą + limity (maxdepth, maxrefs)
      ois.setObjectInputFilter(ObjectInputFilter.Config.createFilter(
          "maxdepth=5;maxrefs=100;com.myapp.*;!*"));
  - id: "13.10"
    name: "Brak weryfikacji integralności serializowanych danych"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-502"
      - "CWE-345"
    desc: |
      Serializowany stan (sesja, cookie, token) przekazywany klientowi bez podpisu — atakujący modyfikuje pola lub podstawia własny obiekt. Nawet bezpieczny format wymaga MAC, jeśli round-trip przez klienta.
    desc_en: "Node.js serialize/unserialize (node-serialize) or vm.runInContext() on untrusted JSON — IIFE pattern in JSON enables RCE."
    lang: "python"
    vuln: |
      # PODATNE — stan w cookie bez podpisu, ufamy po stronie serwera
      state = json.loads(base64.b64decode(request.cookies["state"]))
      if state["role"] == "admin": ...      # klient mógł zmienić role
    safe: |
      # BEZPIECZNE — HMAC nad serializowanymi danymi, weryfikacja stałoczasowa
      raw, sig = cookie.rsplit(".", 1)
      exp = hmac.new(KEY, raw.encode(), hashlib.sha256).hexdigest()
      if not hmac.compare_digest(sig, exp): abort(400)
      state = json.loads(base64.b64decode(raw))
