    lang: "yaml"
    vuln: |
      # PODATNE — privileged + docker.sock
      securityContext: { privileged: true }
      volumes: [{hostPath: {path: /var/run/docker.sock}}]
    safe: |
      # BEZPIECZNE — bez privileged, drop capabilities, readOnlyRootFilesystem,
