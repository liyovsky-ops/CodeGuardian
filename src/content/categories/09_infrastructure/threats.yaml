threats:
  - id: "9.1"
    name: "SSRF (Server-Side Request Forgery)"
    severity: "Critical"
    difficulty: "Medium"
    confidence: "IRON"
    cwe:
      - "CWE-918"
    desc: |
      Serwer wykonuje żądanie HTTP/sieciowe pod URL kontrolowany przez użytkownika — dostęp do zasobów wewnętrznych (metadata cloud 169.254.169.254 → kradzież credków IAM, wewnętrzne API, skan portów).
    lang: "python"
    vuln: |
      # PODATNE
      requests.get(request.json["url"])
      # atak: url = http://169.254.169.254/latest/meta-data/iam/...
    safe: |
      # BEZPIECZNE — allowlist domen/schematów, blokada IP prywatnych/link-local,
      # rozwiązanie DNS + walidacja IP, brak follow-redirect do prywatnych
  - id: "9.2"
    name: "XXE (XML External Entity)"
    severity: "High"
    difficulty: "Medium"
    confidence: "IRON"
    cwe:
      - "CWE-611"
    desc: |
      Parser XML z włączonymi encjami zewnętrznymi czyta lokalne pliki (file://), robi SSRF lub DoS (billion laughs).
    lang: "python"
    vuln: |
      # PODATNE
      import xml.etree.ElementTree as ET; ET.fromstring(data)  # zależnie od parsera
      from lxml import etree; etree.parse(src)                  # encje domyślnie
      # atak: <!DOCTYPE x [<!ENTITY e SYSTEM "file:///etc/passwd">]> ...&e;
    safe: |
      # BEZPIECZNE — wyłącz DTD/encje
      p = etree.XMLParser(resolve_entities=False, no_network=True, dtd_validation=False)
      # lub użyj defusedxml
    note: "Critical przy odczycie plików / SSRF."
  - id: "9.3"
    name: "Prototype Pollution (JS)"
    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-1321"
    desc: |
      Manipulacja __proto__/constructor.prototype przez nieufny merge/clone — wstrzyknięcie właściwości do wszystkich obiektów, prowadzące do DoS, bypassu auth, czasem RCE.
    lang: "javascript"
    vuln: |
      // PODATNE — głęboki merge bez ochrony klucza
      function merge(t, s){ for (const k in s){ if (typeof s[k]==='object') merge(t[k]||(t[k]={}), s[k]); else t[k]=s[k]; } }
      merge({}, JSON.parse(userInput));   // {"__proto__":{"isAdmin":true}}
    safe: |
      // BEZPIECZNE — odrzuć __proto__/constructor/prototype, Object.create(null), Map
      if (k === '__proto__' || k === 'constructor' || k === 'prototype') continue;
