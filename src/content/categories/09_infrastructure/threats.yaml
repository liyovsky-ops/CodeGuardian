  - id: "9.6"
    name: "Zip Slip / Archive extraction traversal"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-22"
    desc: |
      Rozpakowanie archiwum, gdzie wpis ma ścieżkę ../ — zapis poza katalogiem docelowym (nadpisanie binarek/konfigów).
    lang: "python"
    vuln: |
      # PODATNE
      zip.extractall(dest)   # wpisy mogą zawierać ../
    safe: |
      # BEZPIECZNE — waliduj każdą ścieżkę, że po join leży pod dest (zob. 5.4)
      for m in zip.namelist():
          p = os.path.realpath(os.path.join(dest, m))
          if not p.startswith(os.path.realpath(dest) + os.sep): abort(403)
