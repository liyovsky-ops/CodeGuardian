  - id: "9.19"
    name: "Code Injection"
    severity: "Critical"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-94"
      - "CWE-95"
    desc: |
      Nieufny input przekazany do eval/exec jest wykonywany jako kod aplikacji.
    lang: "python"
    vuln: |
      def calc(expr):
          return eval(expr)  # expr="__import__('os').system('rm -rf /')"
    safe: |
      import ast, operator as op
      OPS={ast.Add:op.add, ast.Sub:op.sub, ast.Mult:op.mul, ast.Div:op.truediv}
      def calc(expr):
          def ev(n):
              if isinstance(n, ast.Constant): return n.value
              if isinstance(n, ast.BinOp): return OPS[type(n.op)](ev(n.left), ev(n.right))
              raise ValueError('niedozwolone')
          return ev(ast.parse(expr, mode='eval').body)
