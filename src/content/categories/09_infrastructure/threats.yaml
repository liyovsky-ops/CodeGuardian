    lang: "python"
    vuln: |
      # PODATNE — brak zamknięcia przy wyjątku, brak timeoutu
      conn = pool.get(); conn.execute(q)   # wyjątek -> wyciek połączenia
    safe: |
      # BEZPIECZNE — context manager + timeouty + limity puli
      with pool.connection() as conn:
          conn.execute(q, timeout=5)
