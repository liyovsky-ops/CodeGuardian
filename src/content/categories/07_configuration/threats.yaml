threats:
  - id: "7.1"
    name: "Debug mode w produkcji"
    severity: "Critical"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-489"
      - "CWE-215"
    desc: |
      DEBUG=True (Flask/Django) ujawnia stack trace, zmienne, czasem interaktywną konsolę (Werkzeug = RCE).
    lang: "python"
    vuln: |
      # PODATNE
      app.run(debug=True)   # w produkcji
    safe: |
      # BEZPIECZNE — DEBUG z env, domyślnie False
      app.run(debug=os.environ.get("DEBUG") == "1")
    note: "Critical gdy konsola debug, w innym wypadku High."
  - id: "7.2"
    name: "CORS misconfiguration"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-942"
    desc: |
      Access-Control-Allow-Origin: * razem z Allow-Credentials: true, lub odbijanie dowolnego Origin — pozwala dowolnej stronie czytać uwierzytelnione odpowiedzi.
    lang: "python"
    vuln: |
      # PODATNE — odbija Origin + credentials
      resp.headers["Access-Control-Allow-Origin"] = request.headers["Origin"]
      resp.headers["Access-Control-Allow-Credentials"] = "true"
    safe: |
      # BEZPIECZNE — allowlist konkretnych originów
      if origin in ALLOWED: resp.headers["Access-Control-Allow-Origin"] = origin
  - id: "7.3"
    name: "Brak security headers"
    severity: "Medium"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-693"
      - "CWE-1021"
    desc: |
      Brak Content-Security-Policy, X-Content-Type-Options: nosniff, Strict-Transport-Security, X-Frame-Options/frame-ancestors (clickjacking).
    lang: "http"
    vuln: |
      # PODATNE — odpowiedź bez nagłówków ochronnych
    safe: |
      # BEZPIECZNE
      Content-Security-Policy: default-src 'self'
      X-Content-Type-Options: nosniff
      Strict-Transport-Security: max-age=31536000; includeSubDomains
      X-Frame-Options: DENY
  - id: "7.4"
    name: "Open Redirect"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-601"
    desc: |
      Przekierowanie pod URL z parametru bez walidacji — phishing (zaufana domena → złośliwa) i bypass OAuth redirect_uri.
    lang: "python"
    vuln: |
      # PODATNE
      return redirect(request.args["next"])
      # atak: next=https://evil.com
    safe: |
      # BEZPIECZNE — allowlist / tylko ścieżki względne
      nxt = request.args["next"]
      return redirect(nxt if nxt.startswith("/") and not nxt.startswith("//") else "/")
    note: "High w kontekście OAuth/token leak."
  - id: "7.5"
    name: "Domyślne / słabe poświadczenia i otwarte panele"
    severity: "Critical"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-1188"
      - "CWE-1392"
    desc: |
      Domyślne hasła (admin/admin), otwarte dashboardy (Actuator, /metrics, phpMyAdmin), publiczne buckety S3.
    lang: "text"
    vuln: |
      # PODATNE — domyślne hasło, otwarty panel
      admin / admin    /actuator    publiczny bucket S3
    safe: |
      # BEZPIECZNE — wymuś zmianę haseł, zamknij panele, prywatne buckety,
      # uwierzytelnianie na endpointach administracyjnych
  - id: "7.6"
    name: "Nadmiarowe uprawnienia / brak least privilege"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-250"
      - "CWE-732"
    desc: |
      Kontener jako root, konto DB z uprawnieniami admina, IAM role z *:*, otwarte porty/security groups.
    lang: "yaml"
    vuln: |
      # PODATNE — IAM zbyt szerokie
      Action: "*"
      Resource: "*"
    safe: |
      # BEZPIECZNE — least privilege: tylko potrzebne akcje/zasoby
      Action: ["s3:GetObject"]
      Resource: "arn:aws:s3:::my-bucket/*"
  - id: "7.7"
    name: "Niezaszyfrowana komunikacja / mixed content"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-319"
    desc: |
      HTTP zamiast HTTPS, brak HSTS, mieszanie HTTP w HTTPS.
    lang: "text"
    vuln: |
      # PODATNE
      http://api.example.com   # cleartext
    safe: |
      # BEZPIECZNE — wymuś HTTPS + HSTS, brak mixed content
      https://api.example.com
  - id: "7.8"
    name: "Directory listing / wystawione pliki/serwer tokens"
    severity: "Medium"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-548"
      - "CWE-651"
    desc: |
      Włączony autoindex katalogów, nagłówki Server/X-Powered-By zdradzające wersje, dostępne /server-status, /actuator/env, /debug. Ułatwia rozpoznanie i dotarcie do plików.
    lang: "text"
    vuln: |
      # PODATNE
      autoindex on;                 Server: Apache/2.4.49
      GET /actuator/env -> sekrety
    safe: |
      # BEZPIECZNE — autoindex off, ukryj tokeny serwera,
      # zamknij endpointy diagnostyczne, server_tokens off
  - id: "7.9"
    name: "Subdomain takeover"
    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-350"
    desc: |
      Rekord DNS (CNAME) wskazuje na zwolniony zasób zewnętrzny (S3/Heroku/GitHub Pages). Atakujący przejmuje ten zasób i serwuje treści z zaufanej subdomeny (phishing, kradzież cookie).
    lang: "text"
    vuln: |
      # PODATNE — dangling CNAME do skasowanego zasobu
      blog.example.com  CNAME  deleted-app.herokuapp.com
    safe: |
      # BEZPIECZNE — usuwaj rekordy DNS przy deprovisioningu,
      # regularny audyt dangling DNS, weryfikacja własności
  - id: "7.10"
    name: "Cookie scope / domena / __Host- prefix"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-565"
      - "CWE-1275"
    desc: |
      Cookie ustawione na zbyt szeroką domenę (.example.com) wycieka do wszystkich subdomen (i przejętej, zob. 7.9); brak SameSite; brak prefiksu __Host-/__Secure- pozwalającego na cookie tossing.
    lang: "python"
    vuln: |
      # PODATNE — szeroka domena, brak SameSite
      resp.set_cookie("sid", v, domain=".example.com")
    safe: |
      # BEZPIECZNE — __Host- prefix, bez domeny, Secure+SameSite
      resp.set_cookie("__Host-sid", v, secure=True, httponly=True, samesite="Lax", path="/")
  - id: "7.11"
    name: "Cloud storage / bucket misconfiguration"
    severity: "Critical"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-732"
      - "CWE-284"
    desc: |
      Publiczny bucket S3/GCS/Blob, ACL allUsers, listowanie obiektów, brak szyfrowania, presigned URL bez wygaśnięcia. Klasyk masowych wycieków danych.
    lang: "yaml"
    vuln: |
      # PODATNE — publiczny odczyt + listing
      AccessControl: PublicRead
      BlockPublicAcls: false
    safe: |
      # BEZPIECZNE — block public access, polityka least-privilege,
      # szyfrowanie at-rest, presigned URL z krótkim TTL
      BlockPublicAcls: true
      BlockPublicPolicy: true
  - id: "7.12"
    name: "Niebezpieczne wartości domyślne / fail-open"
    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-1188"
      - "CWE-636"
    desc: |
      Domyślna konfiguracja niezabezpieczona (open by default) lub kontrola, która przy błędzie przepuszcza (fail-open zamiast fail-closed) — np. middleware authz padający = dostęp przyznany.
    lang: "python"
    vuln: |
      # PODATNE — przy błędzie sprawdzenia przepuszcza (fail-open)
      try: allowed = authz.check(user, res)
      except Exception: allowed = True   # !!!
    safe: |
      # BEZPIECZNE — fail-closed: błąd = odmowa, secure-by-default
      try: allowed = authz.check(user, res)
      except Exception: allowed = False
  - id: "7.13"
    name: "Debug Mode Enabled"
    severity: "High"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-489"
    desc: |
      Tryb debug w produkcji udostępnia konsolę/RCE i ujawnia sekrety.
    lang: "python"
    vuln: |
      DEBUG = True  # w produkcji -> Werkzeug debugger = RCE
    safe: |
      DEBUG = os.environ.get('ENV') != 'production'
  - id: "7.14"
    name: "Default Credentials"
    severity: "High"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-1392"
      - "CWE-798"
    desc: |
      Domyślne konta/hasła (admin/admin) pozostawione w produkcji.
    lang: "yaml"
    vuln: |
      admin:
        user: admin
        password: admin
    safe: |
      admin:
        user: admin
        password: ${ADMIN_PW}  # wymuszona zmiana przy pierwszym logowaniu
  - id: "7.15"
    name: "Directory Listing Enabled"
    severity: "Medium"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-548"
    desc: |
      Serwer ujawnia spis plików katalogu — wyciek struktury i wrażliwych plików.
    lang: "yaml"
    vuln: |
      # nginx — listing włączony
      location /files/ {
          autoindex on;
      }
    safe: |
      location /files/ {
          autoindex off;
      }
  - id: "7.16"
    name: "Missing Security Headers"
    severity: "Medium"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-693"
      - "CWE-200"
    desc: |
      Brak nagłówków bezpieczeństwa (CSP, HSTS) i ujawniona wersja serwera ułatwiają atak.
    lang: "yaml"
    vuln: |
      # brak nagłówków, Server: nginx/1.18.0 widoczny
      server_tokens on;
    safe: |
      server_tokens off;
      add_header Content-Security-Policy "default-src 'self'";
      add_header Strict-Transport-Security "max-age=31536000";
  - id: "7.17"
    name: "Verbose Error Messages (Stack Trace Disclosure)"
    severity: "Medium"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-209"
    desc: |
      Szczegółowe błędy/stack trace ujawniają strukturę i wersje komponentów.
    lang: "python"
    vuln: |
      app.config['DEBUG'] = True  # stack trace dla użytkownika
    safe: |
      app.config['DEBUG'] = False
      @app.errorhandler(500)
      def e(_): return 'Internal Error', 500
  - id: "7.18"
    name: "Exposed Configuration Files"
    severity: "Medium"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-540"
      - "CWE-530"
    desc: |
      Pliki źródłowe/backup/konfiguracji (.git, .env, .bak) dostępne publicznie ujawniają sekrety i logikę.
    lang: "yaml"
    vuln: |
      # brak blokady wrażliwych ścieżek
      location / { try_files $uri =404; }
    safe: |
      location ~ /\.(git|env)|\.(bak|old|sql)$ {
          deny all; return 404;
      }
  - id: "7.19"
    name: "Hardcoded Secrets"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-798"
    desc: |
      Sekrety (klucze API, hasła) zaszyte w kodzie źródłowym.
    lang: "python"
    vuln: |
      API_KEY = "sk_live_abc123"  # w repo
    safe: |
      import os
      API_KEY = os.environ['API_KEY']  # z secret managera
  - id: "7.20"
    name: "Overly Permissive CORS"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe: []
    desc: |
      Overly Permissive CORS — zagrożenie z kategorii Configuration wskazane przez audyt arena. Wymaga walidacji wejścia i kontroli po stronie serwera.
    lang: "python"
    vuln: |
      # PODATNE — Overly Permissive CORS
      # brak walidacji / kontroli (przykład poglądowy)
      result = handle(untrusted_input)
    safe: |
      # BEZPIECZNE — Overly Permissive CORS
      # waliduj wejście, stosuj allowlistę i least privilege
      if not is_valid(untrusted_input):
          raise ValueError('odrzucone')
      result = handle(untrusted_input)
