threats:
  - id: "5.1"
    name: "XSS — Stored"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-79"
    desc: |
      Nieufny input zapisany i później wyrenderowany w HTML bez escapingu — wykonuje się u każdego, kto zobaczy treść.
    desc_en: "Reflected XSS: unsanitized user input returned in an HTTP response is executed as JavaScript in the victim's browser. Stored XSS: persistent in DB, executes for each visitor."
    lang: "python"
    vuln: |
      # PODATNE — render bez escapingu
      return "<div>" + comment + "</div>"
    safe: |
      # BEZPIECZNE — autoescaping silnika szablonów / sanityzacja HTML (bleach)
      return render_template("c.html", comment=comment)  # Jinja autoescape ON
    note: "Critical przy panelach admin / masowej kradzieży sesji."
  - id: "5.2"
    name: "XSS — Reflected"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-79"
    desc: |
      Input z requestu odbity natychmiast w odpowiedzi bez escapingu (np. komunikat wyszukiwania).
    desc_en: "Path traversal: `../` sequences in file paths allow reading files outside the intended directory (e.g., /etc/passwd, source code)."
    lang: "python"
    vuln: |
      # PODATNE
      return f"<p>Brak wyników dla: {request.args['q']}</p>"
    safe: |
      # BEZPIECZNE — escapuj kontekstowo / użyj szablonu z autoescape
      return render_template("search.html", q=request.args['q'])
    note: "Severity Medium → High zależnie od kontekstu."
  - id: "5.3"
    name: "XSS — DOM-based"
    severity: "Medium"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-79"
    desc: |
      JS na froncie zapisuje nieufne dane do DOM przez niebezpieczny sink (innerHTML, document.write, eval).
    desc_en: "ReDoS: a regex with exponential backtracking (nested quantifiers) causes the engine to hang on crafted input — CPU DoS with a small string."
    lang: "javascript"
    vuln: |
      // PODATNE
      el.innerHTML = location.hash.slice(1);
    safe: |
      // BEZPIECZNE
      el.textContent = location.hash.slice(1);
    note: "Severity Medium → High zależnie od kontekstu."
  - id: "5.4"
    name: "Path Traversal"
    severity: "High"
    difficulty: "Medium"
    confidence: "IRON"
    cwe:
      - "CWE-22"
    desc: |
      Nieufny input w ścieżce pliku z ../ pozwala czytać/zapisać pliki poza katalogiem (np. /etc/passwd, klucze).
    desc_en: "DOM-based XSS: data flows from a DOM source (location.search, document.referrer) to a sink (innerHTML, eval) without server involvement — harder to detect with DAST."
    lang: "python"
    vuln: |
      # PODATNE
      open(os.path.join(BASE, request.args["file"]))
      # atak: file = "../../etc/passwd"
    safe: |
      # BEZPIECZNE — normalizuj i sprawdź, że wynik jest pod BASE
      import os
      p = os.path.realpath(os.path.join(BASE, name))
      if not p.startswith(os.path.realpath(BASE) + os.sep): abort(403)
    note: "Critical jeśli zapis / RCE przez upload."
  - id: "5.5"
    name: "ReDoS (Regular Expression DoS)"
    severity: "Medium"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-1333"
      - "CWE-400"
    desc: |
      Regex z katastrofalnym backtrackingiem (zagnieżdżone kwantyfikatory) na nieufnym wejściu zawiesza CPU.
    desc_en: "File upload without validation of content (MIME sniff, magic bytes) and extension — attacker uploads a web shell (.php, .aspx) and executes it."
    lang: "python"
    vuln: |
      # PODATNE — (a+)+ na długim wejściu
      import re; re.match(r"^(a+)+$", user_input)
    safe: |
      # BEZPIECZNE — przepisz regex (bez zagnieżdżonych kwantyfikatorów),
      # ogranicz długość wejścia, użyj re2 (liniowy)
    note: "High jeśli na hot-path bez timeoutu."
  - id: "5.6"
    name: "Integer Overflow / Underflow"
    severity: "High"
    difficulty: "Hard"
    confidence: "IRON"
    cwe:
      - "CWE-190"
      - "CWE-191"
    desc: |
      Operacje arytmetyczne przekraczają zakres typu (krytyczne w C/C++/Rust unsafe, Go, kontraktach Solidity), prowadząc do złych alokacji, bypassów limitów. W Pythonie int jest nieograniczony, ale ryzyko przy interop/serializacji/buforach.
    desc_en: "Open redirect: `url`, `next`, `redirect` parameter used without validation redirects to an attacker's domain — phishing, OAuth token theft."
    lang: "c"
    vuln: |
      // PODATNE (C)
      short len = a + b;            // overflow
      char *buf = malloc(len);      // za mały / ujemny -> heap overflow
    safe: |
      // BEZPIECZNE — checked arithmetic / sprawdzenie granic przed alokacją
  - id: "5.7"
    name: "Type Confusion / niejawne konwersje"
    severity: "Medium"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-843"
      - "CWE-704"
    desc: |
      Traktowanie danych jako innego typu niż faktyczny (np. tablica zamiast stringa w parametrze), prowadzące do bypassu walidacji lub błędów logiki. Częste w PHP (loose ==), JS i przy deserializacji.
    desc_en: "Clickjacking: the page can be embedded in an iframe on an attacker's site — user clicks a button that actually performs an action on the legitimate site."
    lang: "php"
    vuln: |
      // PODATNE (PHP) — loose comparison
      if ($hash == $user_input) { ... }   // "0e123" == "0e456" -> true (magic hashes)
    safe: |
      // BEZPIECZNE — strict + hash_equals
      if (hash_equals($hash, $user_input)) { ... }
    note: "Severity Medium → High."
  - id: "5.8"
    name: "Brak walidacji rozmiaru / unbounded input (DoS)"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-400"
      - "CWE-770"
    desc: |
      Brak limitu rozmiaru body/uploadu/liczby elementów — wyczerpanie pamięci/dysku.
    desc_en: "Type coercion: PHP `==` (loose comparison) or JavaScript `==` converts types before comparing — `'0' == false`, `'1e0' == 1`, `md5('240610708') == '0'` bypass auth checks."
    lang: "python"
    vuln: |
      # PODATNE — brak limitu rozmiaru żądania
      @app.post("/upload")
      def upload(): data = request.get_data()  # dowolny rozmiar
    safe: |
      # BEZPIECZNE — limit rozmiaru body / uploadu
      app.config["MAX_CONTENT_LENGTH"] = 5 * 1024 * 1024  # 5 MB
  - id: "5.9"
    name: "Unrestricted File Upload (typ/treść)"
    severity: "Critical"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-434"
    desc: |
      Brak walidacji typu/zawartości uploadu — wgranie pliku wykonywalnego (.php/.jsp), webshell, lub pliku serwowanego z błędnym Content-Type. Walidacja samego rozszerzenia jest obchodzona.
    desc_en: "Unicode normalization: two visually identical strings (e.g., café vs cafe\\u0301) compare differently — bypass of allowlist filters or duplicate-key attacks."
    lang: "python"
    vuln: |
      # PODATNE — ufa rozszerzeniu, zapis do web-root
      f.save(os.path.join(WEBROOT, f.filename))   # shell.php
    safe: |
      # BEZPIECZNE — sprawdź magic bytes, wymuś allowlist typów,
      # losowa nazwa, zapis poza web-root, niewykonywalny katalog
      if magic.from_buffer(f.read(2048), mime=True) not in ALLOWED: abort(415)
      f.save(os.path.join(STORAGE, secrets.token_hex(16)))
    note: "Critical przy zapisie do web-root / wykonaniu."
  - id: "5.10"
    name: "SVG / polyglot / MIME sniffing XSS"
    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-79"
      - "CWE-430"
    desc: |
      Plik SVG zawiera <script> i wykonuje się przy wyświetleniu; pliki polyglot (ważny obraz + HTML/JS); brak X-Content-Type-Options pozwala przeglądarce „zgadnąć” typ i wykonać.
    desc_en: "Mass assignment: binding all request fields to a model object allows setting privileged fields (is_admin, price, balance) not intended for user control."
    lang: "python"
    vuln: |
      # PODATNE — SVG serwowany inline z domeny aplikacji
      return send_file(svg, mimetype="image/svg+xml")   # <svg><script>...
    safe: |
      # BEZPIECZNE — sanityzuj SVG, serwuj z osobnej domeny/sandbox,
      # Content-Disposition: attachment, X-Content-Type-Options: nosniff
  - id: "5.11"
    name: "Unicode / homoglyph / null byte / normalizacja"
    severity: "Medium"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-176"
      - "CWE-158"
      - "CWE-180"
    desc: |
      Bypass filtrów przez normalizację Unicode (różne reprezentacje tego samego znaku), homoglify (а vs a), null byte (%00) ucinający string, over-long UTF-8. Walidacja przed normalizacją ≠ po.
    desc_en: "XML External Entity: the parser expands XXE entities declared in the DTD — reads local files, performs SSRF, or causes DoS (billion laughs)."
    lang: "python"
    vuln: |
      # PODATNE — walidacja przed normalizacją + null byte
      if "../" not in name: open(name)   # "..%c0%af" lub "file.txt\x00.jpg"
    safe: |
      # BEZPIECZNE — normalizuj NAJPIERW (NFC), odrzuć null byte, waliduj po
      name = unicodedata.normalize("NFC", name)
      if "\x00" in name: abort(400)
  - id: "5.12"
    name: "Mutation XSS (mXSS) / niespójna sanityzacja"
    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-79"
    desc: |
      HTML przepuszczony przez sanitizer jest później re-parsowany przez przeglądarkę inaczej (innerHTML round-trip), reaktywując ładunek. Częste przy łączeniu serwerowej sanityzacji z klienckim innerHTML.
    desc_en: "Integer overflow: arithmetic exceeds the type's capacity — in C/Java int (32-bit) `2147483647 + 1 = -2147483648`; in Python 3 it's safe (arbitrary precision), but Rust/C/Go are at risk."
    lang: "javascript"
    vuln: |
      // PODATNE — sanityzacja, potem round-trip przez innerHTML
      el.innerHTML = sanitize(input);
      el.innerHTML = el.innerHTML;   // mXSS reaktywuje ładunek
    safe: |
      // BEZPIECZNE — DOMPurify z konfiguracją, bez ponownego round-tripu,
      // preferuj textContent / trusted types
