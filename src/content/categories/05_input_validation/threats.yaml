  - id: "5.22"
    name: "Crlf Injection (Log Injection)"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-93"
      - "CWE-113"
    desc: |
      Niezfiltrowane znaki CR/LF (\r\n) w nagłówkach HTTP/SMTP pozwalają wstrzyknąć dodatkowe nagłówki lub rozdzielić odpowiedź.
    lang: "python"
    vuln: |
      # PODATNE — surowy input do nagłówka
      from flask import request, Response
      @app.route('/r')
      def r():
          url = request.args.get('url')
          resp = Response('', 302)
          resp.headers['Location'] = url  # url="x\r\nSet-Cookie: admin=1"
          return resp
    safe: |
      # BEZPIECZNE — walidacja + odrzucenie CR/LF
      from flask import request, abort, redirect
      @app.route('/r')
      def r():
          url = request.args.get('url', '')
          if '\r' in url or '\n' in url:
              abort(400)
          return redirect(url)  # framework dodatkowo sanitizuje
  - id: "5.23"
    name: "Directory Traversal"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-22"
      - "CWE-98"
    desc: |
      Ścieżka/URL z inputu (../, http://) pozwala czytać lub dołączać dowolne pliki.
    lang: "python"
    vuln: |
      def read(name):
          return open('/data/' + name).read()  # name="../../etc/passwd"
    safe: |
      import os
      BASE='/data'
      def read(name):
          p = os.path.realpath(os.path.join(BASE, name))
          if not p.startswith(BASE + os.sep): raise ValueError()
          return open(p).read()
