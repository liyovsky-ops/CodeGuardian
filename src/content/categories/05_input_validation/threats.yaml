  - id: "5.19"
    name: "Null Byte Injection"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "IRON"
    cwe:
      - "CWE-158"
      - "CWE-176"
    desc: |
      Null byte / triki normalizacji Unicode omijają walidację rozszerzeń/ścieżek.
    lang: "python"
    vuln: |
      if name.endswith('.txt'):
          open(name)  # "evil.php\x00.txt" omija check
    safe: |
      import unicodedata, os
      name = unicodedata.normalize('NFKC', name)
      if '\x00' in name or not name.endswith('.txt'): raise ValueError()
      open(os.path.join(BASE, os.path.basename(name)))
  - id: "5.20"
    name: "Server-Side Request Forgery (SSRF)"
    severity: "High"
    difficulty: "Medium"
    confidence: "IRON"
    cwe:
      - "CWE-918"
    desc: |
      Serwer pobiera URL podany przez użytkownika — dostęp do zasobów wewnętrznych/metadata cloud.
    lang: "python"
    vuln: |
      import requests
      r = requests.get(request.args['url'])  # http://169.254.169.254/...
    safe: |
      from urllib.parse import urlparse
      import ipaddress, socket
      u=urlparse(request.args['url'])
      ip=ipaddress.ip_address(socket.gethostbyname(u.hostname))
      if ip.is_private or ip.is_loopback: abort(400)
      r=requests.get(u.geturl(), allow_redirects=False)
