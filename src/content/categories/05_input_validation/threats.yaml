  - id: "5.14"
    name: "Buffer Overflow"
    severity: "Critical"
    difficulty: "Hard"
    confidence: "IRON"
    cwe:
      - "CWE-120"
      - "CWE-787"
    desc: |
      Kopiowanie inputu bez sprawdzenia długości nadpisuje pamięć poza buforem (RCE/crash).
    desc_en: "Overly permissive CORS: Access-Control-Allow-Origin: * or trusting any Origin header — allows a malicious site to read responses from APIs."
    lang: "c"
    vuln: |
      char buf[64];
      strcpy(buf, input); // brak kontroli długości
    safe: |
      char buf[64];
      snprintf(buf, sizeof(buf), "%s", input); // ograniczona długość
  - id: "5.15"
    name: "Code Injection"
    severity: "Critical"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-94"
      - "CWE-95"
    desc: |
      Nieufny input przekazany do eval/exec jest wykonywany jako kod aplikacji.
    desc_en: "Server-Side Request Forgery in input validation context: file URL or internal IP in a `url` parameter causes the server to fetch internal resources."
    lang: "python"
    vuln: |
      def calc(expr):
          return eval(expr)  # expr="__import__('os').system('rm -rf /')"
    safe: |
      import ast, operator as op
      OPS={ast.Add:op.add, ast.Sub:op.sub, ast.Mult:op.mul, ast.Div:op.truediv}
      def calc(expr):
          def ev(n):
              if isinstance(n, ast.Constant): return n.value
              if isinstance(n, ast.BinOp): return OPS[type(n.op)](ev(n.left), ev(n.right))
              raise ValueError('niedozwolone')
          return ev(ast.parse(expr, mode='eval').body)
  - id: "5.16"
    name: "Command Injection"
    severity: "Critical"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-78"
    desc: |
      Nieufny input trafia do polecenia powłoki — atakujący wykonuje dowolne komendy.
    desc_en: "CSRF: a malicious site forges a request to an authenticated API — cookie is automatically attached, the action is executed on behalf of the victim."
    lang: "python"
    vuln: |
      import os
