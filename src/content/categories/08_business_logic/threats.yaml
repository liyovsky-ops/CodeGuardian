  - id: "8.16"
    name: "Forced Browsing"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-862"
      - "CWE-285"
    desc: |
      Brak kontroli autoryzacji na funkcji/endpoincie — użytkownik wywołuje akcje administracyjne.
    lang: "python"
    vuln: |
      @app.route('/admin/delete/<id>')
      def delete(id):
          User.delete(id)  # brak sprawdzenia roli
    safe: |
      @app.route('/admin/delete/<id>')
      @require_role('admin')
      def delete(id):
          User.delete(id)
  - id: "8.17"
    name: "Insecure Direct Object Reference (IDOR)"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-639"
    desc: |
      Identyfikator obiektu z requestu używany bez sprawdzenia własności — dostęp do cudzych zasobów.
    lang: "python"
    vuln: |
      @app.route('/invoice/<int:id>')
      def invoice(id):
          return Invoice.get(id).pdf()  # brak sprawdzenia właściciela
    safe: |
      @app.route('/invoice/<int:id>')
      def invoice(id):
          inv = Invoice.get(id)
          if inv.owner_id != current_user.id: abort(403)
          return inv.pdf()
  - id: "8.18"
    name: "Mass Assignment Vulnerabilities"
    severity: "High"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-915"
    desc: |
      Bezpośrednie bindowanie inputu do modelu pozwala ustawić pola, których użytkownik nie powinien (np. is_admin).
    lang: "python"
    vuln: |
      user = User(**request.json)  # is_admin=true z body
    safe: |
      ALLOWED = {'name','email'}
      data = {k:v for k,v in request.json.items() if k in ALLOWED}
      user = User(**data)
  - id: "8.19"
    name: "Step Skipping"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-841"
    desc: |
      Pominięcie wymaganych kroków/przejście wprost do akcji końcowej omija kontrole procesu.
    lang: "python"
    vuln: |
      @app.route('/checkout/confirm')
      def confirm():
          place_order()  # brak sprawdzenia, czy płatność/koszyk OK
    safe: |
      @app.route('/checkout/confirm')
      def confirm():
          if session.get('step') != 'payment_done': abort(409)
          place_order()
