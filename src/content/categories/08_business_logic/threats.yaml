threats:
  - id: "8.1"
    name: "Race Conditions"
    severity: "High"
    difficulty: "Very Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-362"
    desc: |
      Współbieżne operacje na współdzielonym stanie bez synchronizacji dają niespójny wynik — np. podwójne wykorzystanie kuponu, ujemne saldo, double-spend.
    lang: "python"
    vuln: |
      # PODATNE — read-modify-write bez atomowości
      bal = account.balance
      if bal >= amount:
          account.balance = bal - amount   # dwa równoległe żądania -> overdraft
    safe: |
      # BEZPIECZNE — atomowy UPDATE z warunkiem / blokada / SELECT FOR UPDATE
      UPDATE accounts SET balance = balance - :amt WHERE id=:id AND balance >= :amt
  - id: "8.2"
    name: "TOCTOU (Time-of-Check to Time-of-Use)"
    severity: "High"
    difficulty: "Very Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-367"
    desc: |
      Stan zmienia się między sprawdzeniem a użyciem (klasycznie pliki, ale też auth/limity).
    lang: "python"
    vuln: |
      # PODATNE
      if os.access(path, os.W_OK):   # check
          open(path, "w")            # use — plik mógł zostać podmieniony (symlink)
    safe: |
      # BEZPIECZNE — operuj atomowo (open + obsługa wyjątku), O_NOFOLLOW, fd-based
  - id: "8.3"
    name: "Mass Assignment / Auto-binding"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-915"
    desc: |
      Framework automatycznie mapuje pola requestu na atrybuty modelu — atakujący ustawia pola, których nie powinien (is_admin, balance, verified).
    lang: "python"
    vuln: |
      # PODATNE
      user = User(**request.json)        # ustawia dowolne pola
      User.objects.create(**request.POST)
    safe: |
      # BEZPIECZNE — allowlist pól (DTO / serializer fields / strong params)
      user = User(name=data["name"], email=data["email"])
  - id: "8.4"
    name: "Insecure Deserialization"
    severity: "Critical"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-502"
    desc: |
      Deserializacja nieufnych danych formatem pozwalającym na instancjonowanie obiektów / wykonanie kodu (pickle, Java serialization, YAML load, PHP unserialize).
    lang: "python"
    vuln: |
      # PODATNE
      import pickle; obj = pickle.loads(request.data)        # RCE
      import yaml; cfg = yaml.load(data)                      # bez SafeLoader -> RCE
    safe: |
      # BEZPIECZNE
      import json; obj = json.loads(request.data)
      cfg = yaml.safe_load(data)
  - id: "8.5"
    name: "Obejście kroków / workflow bypass"
    severity: "High"
    difficulty: "Very Hard"
    confidence: "IRON"
    cwe:
      - "CWE-840"
    desc: |
      Pominięcie wymaganego etapu procesu (płatność → wysyłka, weryfikacja → aktywacja) przez bezpośrednie wywołanie późniejszego endpointu.
    lang: "python"
    vuln: |
      # PODATNE — /order/confirm dostępny bez sprawdzenia statusu płatności
    safe: |
      # BEZPIECZNE — serwerowa maszyna stanów; każdy krok waliduje poprzedni
      if order.state != "PAID": abort(409)
  - id: "8.6"
    name: "Negatywne / ekstremalne wartości i manipulacja ceny/ilości"
    severity: "High"
    difficulty: "Very Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-20"
      - "CWE-840"
    desc: |
      Brak walidacji zakresu: ujemna ilość → ujemna cena → „zarobek”; ekstremalne liczby → overflow/DoS; manipulacja ceną po stronie klienta.
    lang: "python"
    vuln: |
      # PODATNE
      total = price * request.json["qty"]   # qty = -5 -> ujemny total -> zwrot
    safe: |
      # BEZPIECZNE — waliduj zakres; cena tylko z serwera, nigdy z klienta
      qty = max(1, int(request.json["qty"]))
  - id: "8.7"
    name: "Niespójne / brakujące limity (abuse)"
    severity: "Medium"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-799"
    desc: |
      Brak limitów na akcje kosztowne/wrażliwe (wysyłka SMS, kody promo, rejestracje) → nadużycie finansowe/zasobowe.
    lang: "python"
    vuln: |
      # PODATNE — wysyłka SMS bez limitu na konto/IP
      @app.post("/send-sms")
      def send_sms(): provider.send(to, code)
    safe: |
      # BEZPIECZNE — limit częstotliwości na konto/IP + backoff
      @limiter.limit("3/hour")
      @app.post("/send-sms")
      def send_sms(): provider.send(to, code)
    note: "Severity Medium → High."
  - id: "8.8"
    name: "Replay attack / brak idempotencji"
    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-294"
    desc: |
      Ponowne odtworzenie ważnego żądania (płatność, transfer, głos, webhook) bez nonce/timestamp/idempotency-key → podwójne obciążenie, duplikaty.
    lang: "python"
    vuln: |
      # PODATNE — brak ochrony przed powtórzeniem
      @app.post("/charge")
      def charge(): payment.execute(req.json)   # replay = podwójna płatność
    safe: |
      # BEZPIECZNE — Idempotency-Key + zapis wykonanych + okno czasowe
      key = request.headers["Idempotency-Key"]
      if seen(key): return cached(key)
      result = payment.execute(req.json); store(key, result)
  - id: "8.9"
    name: "Manipulacja czasem / brak walidacji dat"
    severity: "Medium"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-367"
      - "CWE-840"
    desc: |
      Logika ufa czasowi/datom z klienta (data ważności kuponu, data zamówienia, harmonogram), albo nie obsługuje granic (wstecz/naprzód) — nadużycie promocji, ominięcie okien.
    lang: "python"
    vuln: |
      # PODATNE — data ważności z requestu
      if request.json["now"] < coupon.expires: apply(coupon)
    safe: |
      # BEZPIECZNE — czas tylko z serwera, walidacja zakresu
      if server_now() < coupon.expires: apply(coupon)
  - id: "8.10"
    name: "Coupon / referral / promo abuse"
    severity: "Medium"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-840"
      - "CWE-799"
    desc: |
      Wielokrotne wykorzystanie kodu jednorazowego, łączenie promocji, self-referral, tworzenie wielu kont dla bonusu powitalnego — straty finansowe bez technicznej „luki”.
    lang: "python"
    vuln: |
      # PODATNE — brak limitu użycia na użytkownika, brak atomowości
      if coupon.uses_left > 0: apply(coupon); coupon.uses_left -= 1
    safe: |
      # BEZPIECZNE — limit per user, atomowy decrement, detekcja multikont
      UPDATE coupons SET uses_left=uses_left-1 WHERE id=:id AND uses_left>0
      # + unikalność (coupon_id, user_id)
  - id: "8.11"
    name: "Rounding / currency / precyzja finansowa"
    severity: "Medium"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-682"
      - "CWE-1339"
    desc: |
      Użycie float do pieniędzy, błędy zaokrąglania, niespójność walut/kursów, salami slicing (ułamki groszy). Drobne, ale kumulatywne straty/wyciek wartości.
    lang: "python"
    vuln: |
      # PODATNE — float do pieniędzy
      total = 0.1 + 0.2          # 0.30000000000000004
      price = qty * 19.99        # błędy zaokrąglania
    safe: |
      # BEZPIECZNE — Decimal / liczby całkowite (grosze), jawne zaokrąglanie
      from decimal import Decimal, ROUND_HALF_UP
      total = (Decimal("19.99")*qty).quantize(Decimal("0.01"), ROUND_HALF_UP)
  - id: "8.12"
    name: "CAPTCHA / anti-automation bypass"
    severity: "Medium"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-804"
    desc: |
      CAPTCHA weryfikowana po stronie klienta, reużywalny token, brak powiązania z akcją, lub można pominąć krok — automatyzacja rejestracji/spamu/scrapingu.
    lang: "python"
    vuln: |
      # PODATNE — token captcha nie jest weryfikowany serwerowo / reużywalny
      if request.json.get("captcha_ok"): register()
    safe: |
      # BEZPIECZNE — weryfikuj token u dostawcy serwerowo, single-use, powiąż z akcją
      r = verify_captcha(token, remote_ip); if not r.success: abort(400)
  - id: "8.13"
    name: "Approval Workflow Bypass"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "IRON"
    cwe: []
    desc: |
      Approval Workflow Bypass — zagrożenie z kategorii Business Logic wskazane przez audyt arena. Wymaga walidacji wejścia i kontroli po stronie serwera.
    lang: "python"
    vuln: |
      # PODATNE — Approval Workflow Bypass
      # brak walidacji / kontroli (przykład poglądowy)
      result = handle(untrusted_input)
    safe: |
      # BEZPIECZNE — Approval Workflow Bypass
      # waliduj wejście, stosuj allowlistę i least privilege
      if not is_valid(untrusted_input):
          raise ValueError('odrzucone')
      result = handle(untrusted_input)
  - id: "8.14"
    name: "Parameter Tampering"
    severity: "High"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-472"
    desc: |
      Klient kontroluje wartości (cena, ilość) ufane przez serwer — manipulacja transakcją.
    lang: "python"
    vuln: |
      total = request.form['price']  # cena z klienta
      charge(total)
    safe: |
      item = Product.get(request.form['id'])
      total = item.price * int(request.form['qty'])  # cena z serwera
      charge(total)
