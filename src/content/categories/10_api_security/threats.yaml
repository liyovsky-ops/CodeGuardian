    desc: |
      Włączona introspekcja w produkcji ujawnia cały schemat; brak limitu głębokości/złożoności pozwala na DoS zagnieżdżonymi zapytaniami; batching omija rate limity.
    lang: "text"
    vuln: |
      # PODATNE — introspection ON w prod, brak depth/complexity limit
    safe: |
      # BEZPIECZNE — wyłącz introspekcję w prod, depth limit, cost analysis,
      # persisted queries, limit aliasów/batcha
    note: "Medium (introspekcja) → High (query bomb DoS)."
  - id: "10.3"
    name: "Webhook bez weryfikacji podpisu"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-345"
    desc: |
      Endpoint webhooka (np. od Stripe/GitHub) ufa payloadowi bez weryfikacji HMAC/podpisu — atakujący podszywa się i fałszuje zdarzenia (np. „płatność OK”).
    lang: "python"
    vuln: |
      # PODATNE
      data = request.json; process_payment(data)
    safe: |
      # BEZPIECZNE — weryfikuj podpis (stałoczasowo) + timestamp anti-replay
      sig = request.headers["X-Signature"]
      expected = hmac.new(secret, request.data, hashlib.sha256).hexdigest()
      if not hmac.compare_digest(sig, expected): abort(401)
