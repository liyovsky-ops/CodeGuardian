  - id: "10.9"
    name: "Brak Content-Type/method enforcement, CSRF"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-352"
    desc: |
      Endpointy zmieniające stan akceptujące GET lub bez ochrony CSRF (gdy używane cookies) → CSRF.
    lang: "python"
    vuln: |
      # PODATNE — mutacja przez GET, brak tokenu CSRF
      @app.route("/account/delete", methods=["GET"])
      def delete(): ...
    safe: |
      # BEZPIECZNE — tylko POST/DELETE + token CSRF + SameSite cookies
      @app.route("/account/delete", methods=["POST"])
      @csrf_protect
      def delete(): ...
    note: "Severity Medium → High."
  - id: "10.10"
    name: "Server-Side Parameter Pollution / mass batching"
    severity: "Medium"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-235"
      - "CWE-770"
    desc: |
      API przekazuje parametry klienta do wewnętrznego API bez sanityzacji (HPP — duplikaty parametrów interpretowane różnie), lub akceptuje nieograniczone batche/aliasy omijające limity.
    lang: "python"
    vuln: |
      # PODATNE — surowe przekazanie query stringu do internal API
      requests.get(INTERNAL + "/u?" + request.query_string.decode())
      # ?id=1&id=2 -> niejednoznaczna interpretacja
    safe: |
      # BEZPIECZNE — jawne, walidowane parametry; nie forwarduj surowego query
      requests.get(INTERNAL + "/u", params={"id": int(request.args["id"])})
