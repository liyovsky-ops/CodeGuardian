    severity: "High"
    difficulty: "Hard"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-20"
      - "CWE-918"
    desc: |
      OWASP API #10 — ślepe zaufanie danym z zewnętrznego API (brak walidacji odpowiedzi, follow-redirect do dowolnych URL, brak TLS/timeoutów) → injection/SSRF z odpowiedzi partnera.
    lang: "python"
    vuln: |
      # PODATNE — odpowiedź zewnętrznego API wprost do DB/HTML
      r = requests.get(partner_url)        # bez timeout, follow dowolne redirecty
      render(r.json()["html"])             # ufa treści
    safe: |
      # BEZPIECZNE — waliduj schemat odpowiedzi, timeouty, ogranicz redirecty,
      # traktuj dane partnera jak nieufny input (escape/sanitize)
  - id: "10.13"
    name: "Broken Function Level Authorization"
    severity: "High"
    difficulty: "Easy"
    confidence: "IRON"
    cwe:
      - "CWE-862"
      - "CWE-285"
    desc: |
      Brak kontroli autoryzacji na funkcji/endpoincie — użytkownik wywołuje akcje administracyjne.
    lang: "python"
    vuln: |
      @app.route('/admin/delete/<id>')
      def delete(id):
          User.delete(id)  # brak sprawdzenia roli
    safe: |
      @app.route('/admin/delete/<id>')
      @require_role('admin')
      def delete(id):
          User.delete(id)
