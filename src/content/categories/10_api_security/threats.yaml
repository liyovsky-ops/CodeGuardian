threats:
  - id: "10.1"
    name: "Brak / słaby rate limiting & resource limits"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-770"
      - "CWE-799"
    desc: |
      Brak limitu żądań umożliwia brute force, credential stuffing, scraping, DoS i abuse kosztowy. OWASP API #4 (Unrestricted Resource Consumption).
    lang: "python"
    vuln: |
      # PODATNE — endpoint logowania bez limitu
      @app.post("/login")
      def login(): ...
    safe: |
      # BEZPIECZNE — limit per IP/konto + backoff + CAPTCHA na anomalie
      @limiter.limit("5/minute")
      @app.post("/login")
      def login(): ...
  - id: "10.2"
