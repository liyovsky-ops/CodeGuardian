    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-639"
    desc: |
      Identyfikator obiektu z requestu używany bez sprawdzenia własności — dostęp do cudzych zasobów.
    lang: "python"
    vuln: |
      @app.route('/invoice/<int:id>')
      def invoice(id):
          return Invoice.get(id).pdf()  # brak sprawdzenia właściciela
    safe: |
      @app.route('/invoice/<int:id>')
      def invoice(id):
          inv = Invoice.get(id)
          if inv.owner_id != current_user.id: abort(403)
          return inv.pdf()
