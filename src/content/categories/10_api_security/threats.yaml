  - id: "10.24"
    name: "Lack of Rate Limiting"
    severity: "Medium"
    difficulty: "Easy"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-770"
    desc: |
      Brak limitu zapytań/rozmiaru pozwala wyczerpać zasoby API.
    lang: "python"
    vuln: |
      @app.route('/search')
      def search():
          return Item.query.all()  # brak paginacji i rate limit
    safe: |
      @app.route('/search')
      @rate_limit('60/minute')
      def search():
          page=int(request.args.get('page',1))
          return Item.query.paginate(page, 50)
  - id: "10.25"
    name: "Man-in-the-Middle (MITM) Attack"
    severity: "High"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-295"
      - "CWE-300"
    desc: |
      Wyłączona/niepoprawna weryfikacja certyfikatu TLS pozwala na atak MITM.
    lang: "python"
    vuln: |
      import requests
      requests.get(url, verify=False)  # akceptuje dowolny cert
    safe: |
      import requests
      requests.get(url, verify='/etc/ssl/certs/ca.pem')  # weryfikuje łańcuch
