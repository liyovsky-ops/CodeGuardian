  - id: "11.12"
    name: "Hallucination Exploitation"
    severity: "Medium"
    difficulty: "Medium"
    confidence: "IRON"
    cwe:
      - "CWE-1426"
    desc: |
      Ślepe zaufanie wyjściu LLM (kod/fakty) prowadzi do błędów lub eksploatacji halucynacji (np. slopsquatting paczek).
    desc_en: "LLM hallucination leading to insecure code: model generates vulnerable code (eval, concatenation, weak crypto) presented as correct — developer uses it without review."
    lang: "python"
    vuln: |
      pkg = llm('jaką paczkę zainstalować?')
      os.system('pip install ' + pkg)  # halucynowana nazwa = supply chain
    safe: |
      pkg = llm('...'); 
      if pkg not in VERIFIED_PACKAGES: raise ValueError('nieznana paczka')
      subprocess.run(['pip','install', pkg])
