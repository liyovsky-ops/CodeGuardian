    severity: "Medium"
    difficulty: "Medium"
    confidence: "POSSIBLE"
    cwe:
      - "CWE-1427"
    desc: |
      Spreparowane prompty/triki (DAN, token smuggling) omijają zabezpieczenia modelu.
    lang: "python"
    vuln: |
      resp = llm(user_prompt)  # brak guardraili wejścia/wyjścia
      return resp
    safe: |
      if guard_in.flag(user_prompt): return refuse()
      resp = llm(SYSTEM + user_prompt)
      return resp if not guard_out.flag(resp) else refuse()
